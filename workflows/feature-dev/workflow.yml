# PR-based workflow — each story creates a PR, verifier reviews + merges.
# v12.0: Design-first pipeline. PRD → screens → stories → setup → code.
id: feature-dev
name: Feature Development Workflow
version: 12.0
description: |
  Design-first pipeline: PLAN → DESIGN → STORIES → SETUP → IMPLEMENT →
  VERIFY → SECURITY-GATE → FINAL-TEST → DEPLOY.
  Plan step produces PRD only (no stories). Design step generates screens
  from PRD via Stitch (no screen limit). Stories step decomposes PRD into
  user stories using SCREEN_MAP for screen↔story binding.
  Developer creates PR per story, verifier reviews + merges.
  Failed stories are skipped — other stories continue.

agent_mapping:
  planner: main
  setup: atlas
  designer: mert
  developer: [koda, flux, cipher, prism]
  reviewer: [sentinel, iris, sentinel, iris, sentinel]
  tester: sentinel
  security-gate: sentinel
  deployer: atlas

cron:
  interval_ms: 60000  # 1 minute

polling:
  model: minimax/MiniMax-M2.5
  timeoutSeconds: 1800

agents:
  - id: planner
    name: Planner
    role: analysis
    description: Decomposes tasks into ordered user stories based on PRD functional modules.
    workspace:
      baseDir: agents/planner
      files:
        AGENTS.md: agents/planner/AGENTS.md
        SOUL.md: agents/planner/SOUL.md
        IDENTITY.md: agents/planner/IDENTITY.md

  - id: setup
    name: Setup
    role: coding
    description: Prepares environment, creates feature branch, establishes baseline with lint.
    workspace:
      baseDir: agents/setup
      files:
        AGENTS.md: ../../agents/shared/setup/AGENTS.md
        SOUL.md: ../../agents/shared/setup/SOUL.md
        IDENTITY.md: ../../agents/shared/setup/IDENTITY.md

  - id: developer
    name: Developer
    role: coding
    description: Implements features per story, creates PR for each.
    workspace:
      baseDir: agents/developer
      files:
        AGENTS.md: agents/developer/AGENTS.md
        SOUL.md: agents/developer/SOUL.md
        IDENTITY.md: agents/developer/IDENTITY.md

  - id: reviewer
    name: Reviewer
    role: verification
    description: Reads PR review comments, fixes issues, merges PR.
    workspace:
      baseDir: agents/reviewer
      files:
        AGENTS.md: agents/reviewer/AGENTS.md
        SOUL.md: agents/reviewer/SOUL.md
        IDENTITY.md: agents/reviewer/IDENTITY.md

  - id: tester
    name: Tester
    role: testing
    description: Integration testing and final PR to main.
    workspace:
      baseDir: agents/tester
      files:
        AGENTS.md: agents/tester/AGENTS.md
        SOUL.md: agents/tester/SOUL.md
        IDENTITY.md: agents/tester/IDENTITY.md

  - id: security-gate
    name: Security Gate
    role: verification
    description: Scans code for security vulnerabilities before final testing.
    workspace:
      baseDir: agents/security-gate
      files:
        AGENTS.md: agents/security-gate/AGENTS.md
        SOUL.md: agents/security-gate/SOUL.md
        IDENTITY.md: agents/security-gate/IDENTITY.md

  - id: deployer
    name: Deployer
    role: coding
    description: Deploys completed projects — creates systemd service, registers in Mission Control, sets up Cloudflare tunnel.
    workspace:
      baseDir: agents/deployer
      files:
        AGENTS.md: agents/deployer/AGENTS.md
        SOUL.md: agents/deployer/SOUL.md
        IDENTITY.md: agents/deployer/IDENTITY.md

  - id: designer
    name: Designer
    role: coding
    description: Generates UI designs via Stitch API and saves to project.
    workspace:
      baseDir: agents/designer
      files:
        AGENTS.md: agents/designer/AGENTS.md
        SOUL.md: agents/designer/SOUL.md
        IDENTITY.md: agents/designer/IDENTITY.md

steps:
  - id: plan
    agent: planner
    input: |
      Analyze the following task and produce a detailed PRD (Product Requirements Document).
      Do NOT create stories yet — the design step will generate screen designs first,
      then the stories step will decompose based on both PRD and screen designs.

      TASK:
      {{task}}

      Instructions:
      1. Explore the codebase (if repo exists) to understand the stack, conventions, and patterns
      2. Read references/brainstorming-protocol.md for architectural decision-making
      3. Write a comprehensive PRD covering:
         - Project overview and goals
         - Target platform (web/mobile/desktop)
         - Functional requirements (all features, pages, modules)
         - Technical requirements (stack, DB, APIs, auth)
         - UI/UX requirements (pages, screens, interactions)
         - Non-functional requirements (performance, security)
      4. The PRD must be detailed enough for a designer to identify ALL screens
         and for a developer to implement without ambiguity
      5. Determine the repo path and branch name

      PREVIOUS FAILURE (if retrying — READ THIS AND FIX THE ISSUE):
      {{previous_failure}}

      ============================================================
      MANDATORY OUTPUT FORMAT — PIPELINE WILL BREAK IF YOU SKIP ANY KEY
      ============================================================
      STATUS: done
      REPO: <exact repo path, e.g. /home/setrox/projects/myproject>
      BRANCH: <branch name, e.g. feature-name>
      PRD:
      <full PRD text — include all sections, pages, features, technical details>
      ============================================================
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: design
    agent: designer
    input: |
      !include critical-preamble-short.md

      Generate professional UI designs for all frontend screens using Stitch.
      You work from the PRD — stories do not exist yet. Identify screens from the PRD.

      TASK: {{task}}
      PRD: {{prd}}

      === DEVICE TYPE ===
      - "mobile/React Native/Expo/iOS/Android" in TASK → MOBILE
      - "tablet/iPad" in TASK → TABLET
      - Otherwise → DESKTOP

      === STITCH API ===
      Script: $HOME/.openclaw/setfarm-repo/scripts/stitch-api.mjs

      STEP 1 — Get or create Stitch project:
      STITCH_SCRIPT="$HOME/.openclaw/setfarm-repo/scripts/stitch-api.mjs"
      PROJECT_NAME=$(basename {{repo}})
      RESULT=$(node "$STITCH_SCRIPT" find-project "$PROJECT_NAME" 2>/dev/null || echo '{"found":false}')
      if echo "$RESULT" | jq -e '.found' > /dev/null 2>&1 && [ "$(echo "$RESULT" | jq -r '.found')" = "true" ]; then
        PROJECT_ID=$(echo "$RESULT" | jq -r '.projectId')
      else
        RESULT=$(node "$STITCH_SCRIPT" create-project "$PROJECT_NAME")
        PROJECT_ID=$(echo "$RESULT" | jq -r '.projectId')
      fi
      echo "Stitch project ID: $PROJECT_ID"

      === DESIGN SYSTEM SELECTION (YOUR RESPONSIBILITY) ===
      Read references/design-standards.md for available palettes and font pairs.
      Choose a cohesive design direction for this project:
      - aesthetic direction: (minimal, brutalist, luxury, editorial, industrial, organic, playful, corporate)
      - color palette matching the project's domain (from the 8 palettes in the reference)
      - font pair (heading + body) from the 10-pair reference table
      - icon library: Lucide React or Heroicons
      - NEVER choose: Inter, Roboto, Arial, system-ui fonts
      - NEVER choose: purple gradient as primary aesthetic
      - NEVER plan for emoji icons

      === SCREEN IDENTIFICATION (from PRD — YOUR RESPONSIBILITY) ===
      Read the PRD carefully and identify ALL unique screens the project needs:
      1. Each unique page/view = 1 screen entry
      2. Categories: landing, dashboard, list-view, detail-view, form, settings, game-hud, game-over, etc.
      3. No screen limit — generate as many screens as the PRD requires.
         Scale with PRD complexity (simple app: 3-6, complex app: 10-30+).
      4. Backend-only project (0 UI) → set SCREENS_GENERATED: 0 and skip to output

      STEP 1.5 — Check existing screens (DUPLICATE PREVENTION):
      EXISTING=$(node "$STITCH_SCRIPT" list-screens "$PROJECT_ID" 2>/dev/null | jq 'length' 2>/dev/null || echo "0")
      echo "Existing screens in Stitch project: $EXISTING"
      If EXISTING >= number of screens you identified:
        - The project already has enough screens from a previous run
        - Do NOT generate new screens — reuse existing ones
        - Skip directly to output format
        - Set SCREENS_GENERATED to $EXISTING (existing count)
      If EXISTING > 0 but < needed:
        - Some screens exist. Only generate MISSING screens using generate-screen-safe (dedup will handle exact matches)
      If EXISTING = 0:
        - Fresh project. Generate all screens.

      STEP 2 — Generate screens:
      For each unique screen you identified:
      a. Build detailed prompt from screen name, type, description + your chosen design_system colors/fonts
      b. Use generate-screen-safe with screenId as identifier:
         node "$STITCH_SCRIPT" generate-screen-safe "$PROJECT_ID" "<prompt>" "<screen.name>" <DEVICE> GEMINI_3_PRO
      c. If result has "skipped: true" → screen already exists, skip
      d. Otherwise, parse screens from response

      NOTE: Do NOT commit to git — the repo may not exist yet. The setup step will
      download HTML files from Stitch and commit them.

      === FONT MAP (design-standards → Stitch enum) ===
      Space Grotesk → SPACE_GROTESK | DM Sans → DM_SANS | Sora → SORA
      Nunito Sans → NUNITO_SANS | Plus Jakarta Sans → PLUS_JAKARTA_SANS
      Work Sans → WORK_SANS | Manrope → MANROPE | Source Sans 3 → SOURCE_SANS_THREE
      Geist → GEIST | IBM Plex Sans → IBM_PLEX_SANS | Montserrat → MONTSERRAT
      (Fontshare → closest: EPILOGUE or LEXEND)

      === RETRY ===
      Fail → retry 2x. At least 1 screen required, else STATUS: retry.
      Backend-only project (0 UI) → STATUS: done, SCREENS_GENERATED: 0

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      STITCH_PROJECT_ID: <id>
      DEVICE_TYPE: <DESKTOP|MOBILE|TABLET>
      SCREENS_GENERATED: <count>
      DESIGN_SYSTEM:
        aesthetic: <direction>
        palette: <name>
        heading_font: <font>
        body_font: <font>
        icon_library: <library>
      SCREEN_MAP:
      [
        {
          "screenId": "SCR-001",
          "name": "Main Dashboard",
          "type": "dashboard",
          "description": "Primary overview screen"
        }
      ]
      DESIGN_NOTES: <summary>
      ============================================================
    expects: "STATUS: done"
    max_retries: 3
    on_fail:
      escalate_to: human

  - id: stories
    agent: planner
    input: |
      Read the PRD and SCREEN_MAP from the design step, then decompose the PRD into
      ordered user stories. Each story must reference screens from SCREEN_MAP.

      TASK: {{task}}
      PRD: {{prd}}
      REPO: {{repo}}
      BRANCH: {{branch}}
      SCREEN_MAP: {{screen_map}}
      DESIGN_SYSTEM: {{design_system}}

      PREVIOUS FAILURE (if retrying — READ THIS AND FIX THE ISSUE):
      {{previous_failure}}

      Instructions:
      1. Read the PRD thoroughly to understand all features, pages, and modules
      2. Read SCREEN_MAP to understand which screens were designed
      3. Read references/brainstorming-protocol.md for architectural decision-making
      4. Break the PRD into FUNCTIONAL MODULE based stories (see rules below)
      5. Map each story to its relevant screen(s) from SCREEN_MAP using screenId
      6. Order by dependency: design tokens first, then schema/DB, backend, frontend, integration
      7. Each story must fit in one developer session (one context window)
      8. Every acceptance criterion must be mechanically verifiable
      9. Always include "Typecheck passes" as the last criterion in every story
      10. Every story MUST include test criteria — "Tests for [feature] pass"

      STORY CREATION RULES:

      1. FUNCTIONAL MODULE BASED DECOMPOSITION:
         - PRD section count != story count
         - Each story = one functional module (model + API + UI + tests)
         - If a PRD section has multiple independent modules → separate stories
         - If multiple small PRD sections describe the same module → single story

      2. STORY SIZE RULE:
         - Each story should be completable in 15-25 minutes
         - Estimated 200-500 lines of code
         - If a module needs 500+ lines → split (backend + frontend)

      3. TARGET STORY COUNT BY PRD SIZE (MANDATORY — scale up for complex projects):
         - Small PRD (< 100 lines, simple app): 6-10 stories
         - Medium PRD (100-400 lines, moderate complexity): 12-20 stories
         - Large PRD (400+ lines, complex app with auth/CRUD/dashboard): 20-35 stories
         - Very Large PRD (enterprise, multi-role, reporting): 30-50 stories
         IMPORTANT: Every page/module in the PRD MUST have its own story.
         Never use placeholder pages like 'yakinda eklenecek'. If the PRD
         describes a module, it MUST be fully implemented in a story.

      4. STORY CONTENT MUST BE RICH:
         - What the functional module does (full description)
         - DB tables/models (if applicable)
         - API endpoints (if applicable)
         - UI components (if applicable)
         - Test requirements (MANDATORY for every story)
         - screens: which screenId(s) from SCREEN_MAP this story implements

      5. ORDERING (by dependency):
         - 1st: Project setup + design tokens + DB schema
         - 2nd: Auth + user management
         - 3rd: Core backend modules (independent ones can run in parallel)
         - 4th: Frontend modules
         - 5th: Integrations + dashboard

      6. MANDATORY INTEGRATION STORY (LAST STORY):
         - The LAST story MUST be an integration/wiring story
         - Title: "Integration wiring and end-to-end verification"
         - This story depends_on ALL other stories
         - Acceptance criteria MUST include:
           a) All components from src/components/ are imported and rendered in their pages
           b) All routes/pages are navigable (no dead routes)
           c) All interactive elements (buttons, forms, links) trigger real functionality
           d) No placeholder text ("Coming soon", "Game Started!", "TODO", etc.)
           e) State transitions work end-to-end (e.g. menu -> game -> pause -> game over)
           f) Canvas/game/chart renders actual content, not static text
         - This story WIRES everything together - without it, components exist in isolation

      DO NOT:
         - Create micro-stories ("Create user model" separate, "Create user API" separate → WRONG)
         - Make stories for non-code sections (metrics, risks, timeline)
         - Create stories that take longer than 30 minutes

      ============================================================
      MANDATORY OUTPUT FORMAT — PIPELINE WILL BREAK IF YOU SKIP ANY KEY
      ============================================================
      STATUS: done
      STORIES_JSON:
      [
        {
          "id": "US-001",
          "title": "Short title",
          "description": "What this story implements — full functional module description",
          "acceptanceCriteria": ["Criterion 1", "Tests pass", "Typecheck passes"],
          "depends_on": [],
          "screens": ["SCR-001"]
        }
      ]

      DEPENDENCY RULES (depends_on field):
      - Foundation stories (setup, design tokens, DB schema): depends_on: [] (no dependencies)
      - Page/feature stories: depends_on: ["US-001"] (depend on foundation)
      - Integration stories (navigation, routing, final tests): depends_on: ["US-002", "US-003"]
      - Stories with depends_on will NOT start until ALL listed stories are complete
      - ALWAYS add depends_on for stories that reference other stories' output

      SCREEN_MAP:
      <output the SCREEN_MAP again, but now with "stories" field added to each screen>
      [
        {
          "screenId": "SCR-001",
          "name": "Main Dashboard",
          "type": "dashboard",
          "description": "Primary overview screen",
          "stories": ["US-001", "US-003"]
        }
      ]
      ============================================================
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: setup
    agent: setup
    input: |
      !include critical-preamble-short.md

      Prepare the development environment for this feature.

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}

      Instructions:
      1. If repo doesn't exist: mkdir -p {{repo}} && cd {{repo}} && git init
      2. Ensure GitHub remote exists:
         git remote -v || PROJECT_NAME=$(basename {{repo}}) && gh repo create hikmetgulsesli/$PROJECT_NAME --public --source . --remote origin --push 2>/dev/null || true
      3. Ensure main branch exists (CRITICAL for final PR):
         git branch -M main 2>/dev/null || true
         git push -u origin main 2>/dev/null || true
      3.5. Ensure .worktrees/ is in .gitignore (prevents worktree dirs from being committed):
         grep -qxF '.worktrees/' .gitignore 2>/dev/null || echo '.worktrees/' >> .gitignore
      4. Create feature branch: git checkout -b {{branch}}
      5. Read package.json, test config to understand build/test setup
      6. Run build + tests to establish baseline
      DATABASE SETUP (when DB_REQUIRED is postgres):
      - Use external PostgreSQL: read credentials from ~/.openclaw/setfarm-repo/.env (source it or parse SETFARM_DB_HOST, SETFARM_DB_PORT, SETFARM_DB_USER, SETFARM_DB_PASS)
      - Create database: source ~/.openclaw/setfarm-repo/.env && psql "postgresql://$SETFARM_DB_USER:$SETFARM_DB_PASS@$SETFARM_DB_HOST:$SETFARM_DB_PORT/postgres" -c "CREATE DATABASE <project_db_name>;" (ignore if exists)
      - Create app user if needed, grant permissions
      - Store connection string in .env file (never commit .env)
      - Use Drizzle ORM or Prisma for schema management
      - NEVER use \gexec or psql meta-commands with -c flag — use plain SQL only

      FRONTEND BUNDLER SETUP (MANDATORY for browser-targeted TypeScript projects):
      After step 6, check if the project needs a bundler:
      - If package.json exists AND has TypeScript (.ts/.tsx files in src/) AND the project
        targets a browser (has index.html, or uses React/Canvas/DOM APIs):
        a. Check if a bundler already exists in devDependencies (vite, esbuild, webpack, parcel, rollup)
        b. If NO bundler found:
           - Install esbuild: npm install --save-dev esbuild
           - Update "build" script in package.json to use esbuild:
             For plain TS: "esbuild src/index.ts --bundle --outfile=dist/index.js --format=esm --sourcemap --target=es2020"
             For React/TSX: "esbuild src/index.tsx --bundle --outfile=dist/index.js --format=esm --sourcemap --target=es2020 --jsx=automatic --loader:.tsx=tsx --loader:.ts=ts"
           - Update "copy-assets" to also copy index.html and CSS files to dist/
           - REASON: tsc alone produces bare imports (e.g. './Game' without .js extension)
             that browsers cannot resolve. A bundler is required for browser projects.
        c. If bundler already exists: verify build script produces a working bundle
      - If project is Node.js backend only (no index.html, no DOM usage): skip this step
      - NEVER use "tsc" alone as the build command for browser-targeted projects

      7. Create references symlink: ln -sfn $HOME/.openclaw/setfarm-repo/references references

      STITCH DESIGN DOWNLOAD (if STITCH_PROJECT_ID is set):
      Download all screen HTML files from Stitch cloud into stitch/ directory:
        STITCH_SCRIPT="$HOME/.openclaw/setfarm-repo/scripts/stitch-api.mjs"
        STITCH_PROJECT_ID="{{stitch_project_id}}"
        if [ -n "$STITCH_PROJECT_ID" ] ; then
          mkdir -p stitch
          # Step 1: Collect screen IDs from SCREEN_MAP (design step output)
          SCREEN_IDS=$(node -e "try{JSON.parse(process.argv[1]).forEach(s=>{if(s.screenId)console.log(s.screenId)})}catch{}" '{{screen_map}}' 2>/dev/null | tr '\n' ',')
          # Step 2: Create DESIGN_MANIFEST.json (with screen ID fallback)
          if [ -n "$SCREEN_IDS" ]; then
            node "$STITCH_SCRIPT" create-manifest "$STITCH_PROJECT_ID" stitch $SCREEN_IDS
          else
            node "$STITCH_SCRIPT" create-manifest "$STITCH_PROJECT_ID" stitch
          fi
          # Step 3: Download each screen HTML — try list-screens first, fall back to SCREEN_MAP IDs
          SCREENS=$(node "$STITCH_SCRIPT" list-screens "$STITCH_PROJECT_ID" 2>/dev/null || echo "[]")
          SCREEN_COUNT=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8'));console.log(Array.isArray(d)?d.length:0)}catch{console.log(0)}" <<< "$SCREENS" 2>/dev/null || echo "0")
          if [ "$SCREEN_COUNT" -gt 0 ] 2>/dev/null; then
            echo "Downloading $SCREEN_COUNT screens via list-screens..."
            node -e "try{JSON.parse(require('fs').readFileSync('/dev/stdin','utf-8')).forEach(s=>{const sid=(s.name||'').split('/').pop()||s.id||s.screenId||'';const t=s.title||'Untitled';if(sid)console.log(sid+'|'+t)})}catch{}" <<< "$SCREENS" 2>/dev/null | while IFS='|' read -r SCREEN_ID SCREEN_TITLE; do
              SCREEN_FILE=$(echo "$SCREEN_TITLE" | sed 's/[^a-zA-Z0-9_-]/-/g')
              if [ -n "$SCREEN_ID" ]; then
                node "$STITCH_SCRIPT" download-screen "$STITCH_PROJECT_ID" "$SCREEN_ID" "stitch/${SCREEN_FILE:-$SCREEN_ID}.html"
              fi
            done
          elif [ -n "$SCREEN_IDS" ]; then
            echo "list-screens returned empty, using SCREEN_MAP IDs as fallback..."
            node -e "try{JSON.parse(process.argv[1]).forEach(s=>{if(s.screenId)console.log(s.screenId+'|'+(s.name||'Untitled'))})}catch{}" '{{screen_map}}' 2>/dev/null | while IFS='|' read -r SID STITLE; do
              SFILE=$(echo "$STITLE" | sed 's/[^a-zA-Z0-9_-]/-/g')
              if [ -n "$SID" ]; then
                node "$STITCH_SCRIPT" download-screen "$STITCH_PROJECT_ID" "$SID" "stitch/${SFILE:-$SID}.html"
              fi
            done
          fi
          # Step 4: Extract and merge design tokens from ALL HTML files
          node "$STITCH_SCRIPT" extract-tokens stitch stitch/design-tokens.css
          # Step 5: Validate downloaded files
          HTML_COUNT=$(find stitch -name '*.html' 2>/dev/null | wc -l)
          if [ "$HTML_COUNT" -eq 0 ]; then
            echo "FATAL: STITCH_PROJECT_ID set but 0 HTML files downloaded"
            echo "STATUS: fail"
            exit 1
          fi
          echo "Stitch: $HTML_COUNT HTML files downloaded"
          # Step 6: Persist .stitch file
          echo "$STITCH_PROJECT_ID" > .stitch
          git add stitch/ .stitch && git commit -m "design: Stitch UI screens + manifest + tokens" || true
        fi

      8. Push: git push -u origin {{branch}}

      EXISTING CODE CHECK (resume safety):
      - If the project directory already exists:
        a. Run `git status` to check if working tree is clean
        b. Run existing build+test commands to verify baseline
        c. Fix any issues before proceeding
        d. Set EXISTING_CODE: true in output

      !include lint-setup.md

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      BUILD_CMD: <e.g. pnpm run build>
      TEST_CMD: <e.g. pnpm test>
      LINT_CMD: <e.g. pnpm run lint>
      CI_NOTES: <brief>
      BASELINE: <status>
      EXISTING_CODE: <true/false>
      ============================================================
    expects: "STATUS: done"
    max_retries: 4
    on_fail:
      escalate_to: human

  - id: implement
    agent: developer
    type: loop
    loop:
      over: stories
      completion: all_done
      fresh_session: true
      verify_each: true
      verify_step: verify
      parallel_count: 5
    input: |
      !include critical-preamble-short.md

      Implement ONE user story. Create a PR for review.

      TASK: {{task}}
      REPO: {{repo}}
      WORKDIR: {{story_workdir}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}
      LINT_CMD: {{lint_cmd}}

      Work in WORKDIR (git worktree). The branch is already checked out.
      node_modules is symlinked from REPO.

      !include story-loop-context.md

      DESIGN DATA (if available):
      STITCH_PROJECT_ID: {{stitch_project_id}}
      DESIGN_MANIFEST: {{design_manifest}}
      DESIGN_TOKENS: {{design_tokens}}
      STORY_SCREENS: {{story_screens}}

      BEFORE writing code:
      1. Read the FULL story description and ALL acceptance criteria before coding
      2. Read references/design-standards.md + references/backend-standards.md + references/react-best-practices.md
      3. Read references/web-design-guidelines.md for accessibility and interaction rules
      4. If project uses Next.js, read references/next-best-practices.md

      SCREEN BINDING (MANDATORY — do this before writing any code):
      IF STORY_SCREENS is non-empty:
        a. Parse the JSON array — these are the exact screens this story must implement
        b. For each screen: read stitch/<screenId>.html for layout reference
        c. Read stitch/design-tokens.css for colors/fonts/spacing
        d. Implementation MUST match Stitch design (layout, colors, fonts)
        e. NEVER use fonts/colors NOT in design-tokens.css
        f. You MUST @import or copy stitch/design-tokens.css into your main CSS file — do NOT recreate tokens
        g. stitch/design-tokens.css is the SINGLE SOURCE OF TRUTH for all design values
      IF STORY_SCREENS is empty (fallback):
        a. If stitch/ directory exists:
           - Read stitch/DESIGN_MANIFEST.json to find this story's screen
           - Read stitch/<story-id>.html for layout reference
           - Read stitch/design-tokens.css for colors/fonts/spacing
           - Implementation MUST match Stitch design (layout, colors, fonts)
           - NEVER use fonts/colors NOT in design-tokens.css
           - You MUST @import or copy stitch/design-tokens.css into your main CSS file
           - stitch/design-tokens.css is the SINGLE SOURCE OF TRUTH for all design values
      STITCH COMPONENT IMPORT RULES (MANDATORY — NO EXCEPTIONS):
      1. If stitch/ directory has screen HTML files, there MUST be corresponding React components in components/
      2. These screen components MUST be imported and rendered in the main page (app/page.tsx or equivalent)
      3. NEVER create inline/duplicate overlay or screen implementations in page files
      4. NEVER write game state overlays (start, pause, game-over) directly inside page.tsx — ALWAYS use dedicated components
      5. If a component exists in components/ that matches a Stitch screen, you MUST use it — do NOT recreate it
