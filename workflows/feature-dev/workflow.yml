      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}
      FINAL_PR: {{final_pr}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}
      LINT_CMD: {{lint_cmd}}
      PROGRESS LOG: {{progress}}

      PREVIOUS FAILURE (if retrying — YOU MUST FIX THESE ISSUES FIRST before doing anything else):
      {{previous_failure}}

      PRE-FLIGHT ANALYSIS (automated static checks — review these FIRST):
      {{preflight_analysis}}

      Focus your review on:
      1. Issues flagged by pre-flight (ESLint errors, TypeScript errors)
      2. The git diff for logic/semantic issues
      3. Design compliance (fonts, colors, design tokens)
      DO NOT re-read entire files — the pre-flight already checked syntax/types.

      GIT COMMIT RULE: ALWAYS use `git commit -m "message"`. NEVER use bare `git commit`
