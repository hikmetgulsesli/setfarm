# PR-based workflow — each story creates a PR, verifier reviews + merges.
# v11.2: Mandatory esbuild for browser TS + Playwright smoke test in verify+final-test.
id: feature-dev
name: Feature Development Workflow
version: 11.2
description: |
  Full-quality pipeline with Stitch design generation. PLAN → SETUP → DESIGN →
  IMPLEMENT → VERIFY → SECURITY-GATE → FINAL-TEST → DEPLOY.
  Designer generates UI screens via Stitch API before coding begins.
  Developer creates PR per story, verifier reviews + merges.
  Failed stories are skipped — other stories continue.

agent_mapping:
  planner: main
  setup: atlas
  designer: mert
  developer: [koda, flux, cipher, prism]
  reviewer: [sentinel, iris, sentinel, iris, sentinel]
  tester: sentinel
  security-gate: sentinel
  deployer: atlas

cron:
  interval_ms: 60000  # 1 minute

polling:
  model: kimi-coding/k2p5
  timeoutSeconds: 1800

agents:
  - id: planner
    name: Planner
    role: analysis
    description: Decomposes tasks into ordered user stories based on PRD functional modules.
    workspace:
      baseDir: agents/planner
      files:
        AGENTS.md: agents/planner/AGENTS.md
        SOUL.md: agents/planner/SOUL.md
        IDENTITY.md: agents/planner/IDENTITY.md

  - id: setup
    name: Setup
    role: coding
    description: Prepares environment, creates feature branch, establishes baseline with lint.
    workspace:
      baseDir: agents/setup
      files:
        AGENTS.md: ../../agents/shared/setup/AGENTS.md
        SOUL.md: ../../agents/shared/setup/SOUL.md
        IDENTITY.md: ../../agents/shared/setup/IDENTITY.md

  - id: developer
    name: Developer
    role: coding
    description: Implements features per story, creates PR for each.
    workspace:
      baseDir: agents/developer
      files:
        AGENTS.md: agents/developer/AGENTS.md
        SOUL.md: agents/developer/SOUL.md
        IDENTITY.md: agents/developer/IDENTITY.md

  - id: reviewer
    name: Reviewer
    role: verification
    description: Reads PR review comments, fixes issues, merges PR.
    workspace:
      baseDir: agents/reviewer
      files:
        AGENTS.md: agents/reviewer/AGENTS.md
        SOUL.md: agents/reviewer/SOUL.md
        IDENTITY.md: agents/reviewer/IDENTITY.md

  - id: tester
    name: Tester
    role: testing
    description: Integration testing and final PR to main.
    workspace:
      baseDir: agents/tester
      files:
        AGENTS.md: agents/tester/AGENTS.md
        SOUL.md: agents/tester/SOUL.md
        IDENTITY.md: agents/tester/IDENTITY.md

  - id: security-gate
    name: Security Gate
    role: verification
    description: Scans code for security vulnerabilities before final testing.
    workspace:
      baseDir: agents/security-gate
      files:
        AGENTS.md: agents/security-gate/AGENTS.md
        SOUL.md: agents/security-gate/SOUL.md
        IDENTITY.md: agents/security-gate/IDENTITY.md

  - id: deployer
    name: Deployer
    role: coding
    description: Deploys completed projects — creates systemd service, registers in Mission Control, sets up Cloudflare tunnel.
    workspace:
      baseDir: agents/deployer
      files:
        AGENTS.md: agents/deployer/AGENTS.md
        SOUL.md: agents/deployer/SOUL.md
        IDENTITY.md: agents/deployer/IDENTITY.md

  - id: designer
    name: Designer
    role: coding
    description: Generates UI designs via Stitch API and saves to project.
    workspace:
      baseDir: agents/designer
      files:
        AGENTS.md: agents/designer/AGENTS.md
        SOUL.md: agents/designer/SOUL.md
        IDENTITY.md: agents/designer/IDENTITY.md

steps:
  - id: plan
    agent: planner
    input: |
      Decompose the following task into ordered user stories for autonomous execution.

      TASK:
      {{task}}

      Instructions:
      1. Explore the codebase to understand the stack, conventions, and patterns
      2. Read references/design-standards.md for available palettes and font pairs
      3. Read references/brainstorming-protocol.md for architectural decision-making
      4. Break the task into FUNCTIONAL MODULE based stories (see rules below)
      5. Order by dependency: design tokens first, then schema/DB, backend, frontend, integration
      6. Each story must fit in one developer session (one context window)
      7. Every acceptance criterion must be mechanically verifiable
      8. Always include "Typecheck passes" as the last criterion in every story
      9. Every story MUST include test criteria — "Tests for [feature] pass"
      10. The developer is expected to write tests as part of each story

      STORY CREATION RULES:

      1. FUNCTIONAL MODULE BASED DECOMPOSITION:
         - PRD section count != story count
         - Each story = one functional module (model + API + UI + tests)
         - If a PRD section has multiple independent modules → separate stories
         - If multiple small PRD sections describe the same module → single story

      2. STORY SIZE RULE:
         - Each story should be completable in 15-25 minutes
         - Estimated 200-500 lines of code
         - If a module needs 500+ lines → split (backend + frontend)

      3. TARGET STORY COUNT BY PRD SIZE (MANDATORY — scale up for complex projects):
         - Small PRD (< 100 lines, simple app): 6-10 stories
         - Medium PRD (100-400 lines, moderate complexity): 12-20 stories
         - Large PRD (400+ lines, complex app with auth/CRUD/dashboard): 20-35 stories
         - Very Large PRD (enterprise, multi-role, reporting): 30-50 stories
         IMPORTANT: Every page/module in the PRD MUST have its own story.
         Never use placeholder pages like 'yakinda eklenecek'. If the PRD
         describes a module, it MUST be fully implemented in a story.

      4. STORY CONTENT MUST BE RICH:
         - What the functional module does (full description)
         - DB tables/models (if applicable)
         - API endpoints (if applicable)
         - UI components (if applicable)
         - Test requirements (MANDATORY for every story)

      5. ORDERING (by dependency):
         - 1st: Project setup + design tokens + DB schema
         - 2nd: Auth + user management
         - 3rd: Core backend modules (independent ones can run in parallel)
         - 4th: Frontend modules
         - 5th: Integrations + dashboard

      6. NEVER:
         - Create micro-stories ("Create user model" separate, "Create user API" separate → WRONG)
         - Make stories for non-code sections (metrics, risks, timeline)
         - Create stories that take longer than 30 minutes

      DESIGN SYSTEM — Select a cohesive design direction for the project:
      - Read references/design-standards.md for available palettes and font pairs
      - Choose: aesthetic direction (minimal, brutalist, luxury, editorial, industrial, organic, playful, corporate)
      - Choose: color palette matching the project's domain (from the 8 palettes in the reference)
      - Choose: font pair (heading + body) from the 10-pair reference table
      - Choose: icon library (Lucide React or Heroicons)
      - NEVER choose: Inter, Roboto, Arial, system-ui fonts
      - NEVER choose: purple gradient as primary aesthetic
      - NEVER plan for emoji icons
      - Include design tokens (CSS custom properties) in the FIRST user story

      ============================================================
      MANDATORY OUTPUT FORMAT — PIPELINE WILL BREAK IF YOU SKIP ANY KEY
      ============================================================
      STATUS: done
      REPO: <exact repo path, e.g. /home/setrox/myproject>
      BRANCH: <branch name, e.g. feature-name>
      DESIGN_SYSTEM:
        aesthetic: <direction>
        palette: <name>
        heading_font: <font>
        body_font: <font>
        icon_library: <library>
      DB_REQUIRED: false/postgres (if project needs a database, use postgres. External PostgreSQL credentials are in ~/.openclaw/setfarm-repo/.env — agent reads SETFARM_DB_HOST, SETFARM_DB_PORT, SETFARM_DB_USER, SETFARM_DB_PASS from there)
      STORIES_JSON:
      [
        {
          "id": "US-001",
          "title": "Short title",
          "description": "What this story implements — full functional module description including DB tables, API endpoints, UI components",
          "acceptanceCriteria": ["Criterion 1", "Tests pass", "Typecheck passes"]
        }
      ]

      BRANCH rules: NEVER use "main". Generate a unique kebab-case name (2-4 words).
      ============================================================
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: setup
    agent: setup
    input: |
      !include critical-preamble-short.md

      Prepare the development environment for this feature.

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}

      Instructions:
      1. If repo doesn't exist: mkdir -p {{repo}} && cd {{repo}} && git init
      2. Ensure GitHub remote exists:
         git remote -v || PROJECT_NAME=$(basename {{repo}}) && gh repo create hikmetgulsesli/$PROJECT_NAME --public --source . --remote origin --push 2>/dev/null || true
      3. Ensure main branch exists (CRITICAL for final PR):
         git branch -M main 2>/dev/null || true
         git push -u origin main 2>/dev/null || true
      3.5. Ensure .worktrees/ is in .gitignore (prevents worktree dirs from being committed):
         grep -qxF '.worktrees/' .gitignore 2>/dev/null || echo '.worktrees/' >> .gitignore
      4. Create feature branch: git checkout -b {{branch}}
      5. Read package.json, test config to understand build/test setup
      6. Run build + tests to establish baseline
      DATABASE SETUP (when DB_REQUIRED is postgres):
      - Use external PostgreSQL: read credentials from ~/.openclaw/setfarm-repo/.env (source it or parse SETFARM_DB_HOST, SETFARM_DB_PORT, SETFARM_DB_USER, SETFARM_DB_PASS)
      - Create database: source ~/.openclaw/setfarm-repo/.env && psql "postgresql://$SETFARM_DB_USER:$SETFARM_DB_PASS@$SETFARM_DB_HOST:$SETFARM_DB_PORT/postgres" -c "CREATE DATABASE <project_db_name>;" (ignore if exists)
      - Create app user if needed, grant permissions
      - Store connection string in .env file (never commit .env)
      - Use Drizzle ORM or Prisma for schema management
      - NEVER use \gexec or psql meta-commands with -c flag — use plain SQL only

      FRONTEND BUNDLER SETUP (MANDATORY for browser-targeted TypeScript projects):
      After step 6, check if the project needs a bundler:
      - If package.json exists AND has TypeScript (.ts/.tsx files in src/) AND the project
        targets a browser (has index.html, or uses React/Canvas/DOM APIs):
        a. Check if a bundler already exists in devDependencies (vite, esbuild, webpack, parcel, rollup)
        b. If NO bundler found:
           - Install esbuild: npm install --save-dev esbuild
           - Update "build" script in package.json to use esbuild:
             For plain TS: "esbuild src/index.ts --bundle --outfile=dist/index.js --format=esm --sourcemap --target=es2020"
             For React/TSX: "esbuild src/index.tsx --bundle --outfile=dist/index.js --format=esm --sourcemap --target=es2020 --jsx=automatic --loader:.tsx=tsx --loader:.ts=ts"
           - Update "copy-assets" to also copy index.html and CSS files to dist/
           - REASON: tsc alone produces bare imports (e.g. './Game' without .js extension)
             that browsers cannot resolve. A bundler is required for browser projects.
        c. If bundler already exists: verify build script produces a working bundle
      - If project is Node.js backend only (no index.html, no DOM usage): skip this step
      - NEVER use "tsc" alone as the build command for browser-targeted projects

      7. Create references symlink: ln -sfn /home/setrox/.openclaw/setfarm-repo/references references
      8. Push: git push -u origin {{branch}}

      EXISTING CODE CHECK (resume safety):
      - If the project directory already exists:
        a. Run `git status` to check if working tree is clean
        b. Run existing build+test commands to verify baseline
        c. Fix any issues before proceeding
        d. Set EXISTING_CODE: true in output

      !include lint-setup.md

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      BUILD_CMD: <e.g. pnpm run build>
      TEST_CMD: <e.g. pnpm test>
      LINT_CMD: <e.g. pnpm run lint>
      CI_NOTES: <brief>
      BASELINE: <status>
      EXISTING_CODE: <true/false>
      ============================================================
    expects: "STATUS: done"
    max_retries: 4
    on_fail:
      escalate_to: human

  - id: design
    agent: designer
    input: |
      !include critical-preamble-short.md

      Generate professional UI designs for all frontend screens using Stitch.

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}
      DESIGN_SYSTEM: {{design_system}}

      === DEVICE TYPE ===
      - "mobile/React Native/Expo/iOS/Android" in TASK → MOBILE
      - "tablet/iPad" in TASK → TABLET
      - Otherwise → DESKTOP

      === STITCH API ===
      Script: /home/setrox/.openclaw/setfarm-repo/scripts/stitch-api.mjs

      STEP 1 — Get or create project (ONE COMMAND — handles .stitch persistence):
      STITCH_SCRIPT="/home/setrox/.openclaw/setfarm-repo/scripts/stitch-api.mjs"
      RESULT=$(node "$STITCH_SCRIPT" ensure-project "$(basename {{repo}})" "{{repo}}")
      PROJECT_ID=$(echo "$RESULT" | jq -r '.projectId')
      echo "Stitch project ID: $PROJECT_ID (source: $(echo "$RESULT" | jq -r '.source'))"

      STEP 2 — Generate screens (UNIQUE screens only — NOT one per story):
      CRITICAL RULE: Generate ONE screen per UNIQUE page/view, NOT per story.
      Multiple stories may share the same screen (e.g. 3 stories about the main page = 1 screen).
      Before generating, classify each story into a screen category:
        - main-menu/landing/home → 1 screen
        - gameplay/hud/overlay → 1 screen  
        - game-over/results → 1 screen
        - pause/settings → 1 screen
        - high-scores/leaderboard → 1 screen
        - dashboard/overview → 1 screen
        - list-view/browse → 1 screen per distinct list
        - detail-view → 1 screen per distinct entity type
        - form/editor → 1 screen per distinct form
      MAXIMUM: Do not exceed 8 screens per project. Most projects need 3-6 screens.
      If a project has 20 stories, it still probably has only 4-6 unique screens.

      For each UNIQUE screen (not each story):
        a. Build detailed prompt (include colors, fonts, layout from design_system)
        b. Use generate-screen-safe to avoid duplicates:
           node "" generate-screen-safe "" "<prompt>" "<Screen Title>" <DEVICE> GEMINI_3_PRO
        c. If result has "skipped: true" → screen already exists, skip download
        d. Otherwise, parse screens from response, download HTML + screenshot

      STEP 3 — Save to stitch/:
      - stitch/<story-id>.html, stitch/<story-id>.png
      - stitch/DESIGN_MANIFEST.json
      - stitch/design-tokens.css (extracted from first HTML)
      IMPORTANT: You MUST download the HTML files. Writing a manifest without HTML is NOT enough.
      The server will REJECT design completion if stitch/ has 0 HTML files.

      STEP 4 — Commit + push (no need to manually create .stitch — ensure-project already did it):
      git add stitch/ .stitch && git commit -m "design: Stitch UI designs" && git push

      === FONT MAP (design-standards → Stitch enum) ===
      Space Grotesk → SPACE_GROTESK | DM Sans → DM_SANS | Sora → SORA
      Nunito Sans → NUNITO_SANS | Plus Jakarta Sans → PLUS_JAKARTA_SANS
      Work Sans → WORK_SANS | Manrope → MANROPE | Source Sans 3 → SOURCE_SANS_THREE
      Geist → GEIST | IBM Plex Sans → IBM_PLEX_SANS | Montserrat → MONTSERRAT
      (Fontshare → closest: EPILOGUE or LEXEND)

      === RETRY ===
      Fail → retry 2x. At least 1 screen required, else STATUS: retry.
      Backend-only project (0 UI stories) → STATUS: done, SCREENS_GENERATED: 0

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      STITCH_PROJECT_ID: <id>
      DEVICE_TYPE: <DESKTOP|MOBILE|TABLET>
      SCREENS_GENERATED: <count>
      DESIGN_MANIFEST: stitch/DESIGN_MANIFEST.json
      DESIGN_TOKENS: stitch/design-tokens.css
      DESIGN_NOTES: <summary>
      ============================================================
    expects: "STATUS: done"
    max_retries: 3
    on_fail:
      escalate_to: human

  - id: implement
    agent: developer
    type: loop
    loop:
      over: stories
      completion: all_done
      fresh_session: true
      verify_each: true
      verify_step: verify
      parallel_count: 5
    input: |
      !include critical-preamble-short.md

      Implement ONE user story. Create a PR for review.

      TASK: {{task}}
      REPO: {{repo}}
      WORKDIR: {{story_workdir}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}
      LINT_CMD: {{lint_cmd}}

      Work in WORKDIR (git worktree). The branch is already checked out.
      node_modules is symlinked from REPO.

      !include story-loop-context.md

      DESIGN DATA (if available):
      STITCH_PROJECT_ID: {{stitch_project_id}}
      DESIGN_MANIFEST: {{design_manifest}}
      DESIGN_TOKENS: {{design_tokens}}

      BEFORE writing code:
      1. Read the FULL story description and ALL acceptance criteria before coding
      2. Read references/design-standards.md + references/backend-standards.md + references/react-best-practices.md
      3. Read references/web-design-guidelines.md for accessibility and interaction rules
      4. If project uses Next.js, read references/next-best-practices.md
      3. If stitch/ directory exists:
         a. Read stitch/DESIGN_MANIFEST.json → find this story's screen
         b. Read stitch/<story-id>.html for layout reference
         c. Read stitch/design-tokens.css for colors/fonts/spacing
         d. Implementation MUST match Stitch design (layout, colors, fonts)
         e. NEVER use fonts/colors NOT in design-tokens.css
         f. You MUST @import or copy stitch/design-tokens.css into your main CSS file — do NOT recreate tokens.
         g. stitch/design-tokens.css is the SINGLE SOURCE OF TRUTH for all design values.
      STITCH COMPONENT IMPORT RULES (MANDATORY — NO EXCEPTIONS):
      1. If stitch/ directory has screen HTML files, there MUST be corresponding React components in components/
      2. These screen components MUST be imported and rendered in the main page (app/page.tsx or equivalent)
      3. NEVER create inline/duplicate overlay or screen implementations in page files
      4. NEVER write game state overlays (start, pause, game-over) directly inside page.tsx — ALWAYS use dedicated components
      5. If a component exists in components/ that matches a Stitch screen, you MUST use it — do NOT recreate it
      6. After implementation, verify: every file in stitch/DESIGN_MANIFEST.json screens has a matching import in the render tree

      !include implement-design-enforcement.md


      UI CONTRACT (auto-generated from Stitch design — EVERY element MUST work):
      {{ui_contract}}

      LAYOUT STRUCTURE (auto-extracted from Stitch HTML — REPRODUCE THIS EXACTLY):
      {{layout_skeleton}}

      LAYOUT RULES (MANDATORY):
      1. Every container shown above MUST exist in your implementation with the SAME nesting
      2. Use the same CSS class names or semantic equivalents (.score-board → ScoreBoard component)
      3. Preserve flex/grid layout type — if Stitch uses flex, use flex. If grid, use grid.
      4. Preserve container properties (border, border-radius, padding, background, gap)
      5. Do NOT flatten the hierarchy — if Stitch shows a wrapper card, you MUST have a wrapper
      6. Do NOT invent your own layout — follow the skeleton above
      7. Read stitch/<screen>.html for full detail if skeleton is unclear

      DESIGN CONTRACT RULES:
      1. Every navigation link MUST route to its page (install react-router-dom if needed)
      2. Every button MUST have a functional onClick handler
      3. Every input MUST have onChange and controlled state
      4. All hardcoded demo data MUST be replaced with dynamic props/state

      !include db-context.md

      !include browser-verification.md

      === WORKFLOW ===

      1. Read progress-{{run_id}}.txt to understand what previous stories implemented

      2. cd into WORKDIR

      3. Create story branch from feature branch:
         cd {{repo}} && git checkout {{branch}} && git pull origin {{branch}}
         RUN_SHORT=$(echo "{{run_id}}" | cut -c1-8)
         STORY_BRANCH="${RUN_SHORT}-{{current_story_id}}"
         git checkout -b "$STORY_BRANCH"

      4. Implement the story fully:
         - Write tests for EVERY acceptance criterion
         - Implement the functional module completely
         - No TODOs, no placeholders, no shortcuts

      5. Lint: {{lint_cmd}}
         Fix ALL lint errors until lint passes clean.

      6. Build: {{build_cmd}}
         Fix ALL build/type errors until build passes.

      7. Test: {{test_cmd}}
         Fix ALL failing tests until tests pass.

      8. Commit:
         git add -A && git commit -m "feat: {{current_story_id}} - {{current_story_title}}"

      9. Push:
         git push -u origin "$STORY_BRANCH"

      10. Create PR:
          PR_URL=$(gh pr create --base {{branch}} --head "$STORY_BRANCH" \
            --title "feat: {{current_story_id}} - {{current_story_title}}" \
            --body "$(cat <<'PRBODY'
          ## Story
          {{current_story}}

          ## Changes
          <describe what you implemented>

          ## Tests
          <describe what tests you wrote>
          PRBODY
          )")
          echo "PR created: $PR_URL"

      11. Write detailed progress to progress-{{run_id}}.txt:
          === {{current_story_id}}: {{current_story_title}} ===
          COMPLETED: $(date -Iseconds)
          FILES CHANGED: <list of files>
          KEY DECISIONS: <architectural decisions made>
          DEPENDENCIES ADDED: <if any>

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      STORY_BRANCH: <exact branch name, e.g. a1b2c3d4-US-001>
      PR_URL: <full PR URL from gh pr create>
      CHANGES: <what you implemented>
      TESTS: <what tests you wrote>

      STORY_BRANCH must be the exact branch name you created and pushed.
      PR_URL must be the URL returned by gh pr create.
      ============================================================
    expects: "STATUS: done"
    max_retries: 5
    on_fail:
      escalate_to: human

  - id: verify
    agent: reviewer
    input: |
      !include critical-preamble-short.md

      Verify the developer's story implementation by reading PR review comments,
      fixing issues, then merging the PR.

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}
      STORY_BRANCH: {{story_branch}}
      PR_URL: {{pr_url}}
      CHANGES: {{changes}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}
      LINT_CMD: {{lint_cmd}}
      CURRENT STORY: {{current_story}}
      PROGRESS LOG: {{progress}}

      === VERIFY + FIX + MERGE WORKFLOW ===


      STEP 1 — Checkout and read PR reviews:
      1. cd into {{repo}}
      2. git fetch origin
      3. git checkout {{story_branch}} && git pull origin {{story_branch}}
      4. Get PR number and read review comments:
         PR_NUM=$(gh pr view "{{pr_url}}" --json number --jq '.number' 2>/dev/null || echo "")
         REVIEWS=$(gh pr view "{{pr_url}}" --json reviews --jq '.reviews[].body' 2>/dev/null || echo "")
         COMMENTS=$(gh pr view "{{pr_url}}" --json comments --jq '.comments[].body' 2>/dev/null || echo "")
         if [ -n "$PR_NUM" ]; then
           REPO_SLUG=$(gh pr view "{{pr_url}}" --json url --jq '.url' | sed 's|https://github.com/||;s|/pull/.*||')
           REVIEW_COMMENTS=$(gh api "repos/$REPO_SLUG/pulls/$PR_NUM/comments" --jq '.[].body' 2>/dev/null || echo "")
         fi
      5. If external reviews exist → read them and proceed to STEP 2
         If NO reviews exist → skip to STEP 3 (do your own quality review instead)
         Do NOT retry waiting for reviews — you already waited 5 minutes. Proceed with your own judgment.

      STEP 2 — Fix review issues (only if external reviews exist):
      1. Read ALL review suggestions and comments carefully
      2. If reviews mention issues or suggestions → fix ALL of them
      3. Run lint: {{lint_cmd}} → fix any lint errors
      4. Run build: {{build_cmd}} → fix any build errors
      5. Run test: {{test_cmd}} → fix any test failures
      6. If fixes were needed:
         git add -A && git commit -m "fix: address review comments for {{current_story_id}}"
         git push

      STEP 3 — Quality + Design check (always do this, whether or not external reviews exist):
      1. Review the code changes yourself:
         - Code exists (not just TODOs/placeholders)
         - Tests were written for this story
         - No hardcoded secrets, .env not committed
      1.5. Stitch design compliance (if stitch/ exists):
         - Check CSS vars from stitch/design-tokens.css are used
         - FAIL if main CSS file has custom tokens that duplicate stitch/design-tokens.css values (agent must not recreate tokens)
         - grep hardcoded colors not in design-tokens → WARN
         - Verify fonts match stitch/DESIGN_MANIFEST.json
      1.55. Layout structure compliance (if stitch/ exists):
         - Read stitch/<story-html>.html for expected DOM structure
         - For each top-level section with a class name in stitch HTML,
           verify a matching container/component exists in implementation:
           a. grep for class name (kebab-case) or component name (PascalCase)
           b. FAIL if a major section is completely missing (e.g. .score-board, .game-container)
           c. WARN if container nesting is significantly different
         - Check layout type preserved:
           a. If stitch uses flex layout → implementation should use flex (not float/table)
           b. If stitch uses grid → implementation should use grid
         - This checks STRUCTURE not pixel-perfection
      1.57. Web Interface Guidelines compliance:
         - grep for anti-patterns: transition: all, outline-none without focus replacement, div onClick without button
         - Verify all images have explicit width and height attributes
         - Verify all icon-only buttons have aria-label
         - Verify form inputs have associated labels
         - WARN on any violations found
      1.56. Stitch component import verification (if stitch/ exists):
         - List all screen HTML files in stitch/ directory
         - For each screen, verify a corresponding React component exists in components/
         - CRITICAL: Verify that each screen component is IMPORTED in app/page.tsx (or main entry)
         - grep for inline overlay/modal implementations in page.tsx — if found, FAIL
         - Patterns to flag: gameState conditions rendering plain text overlays without component imports
         - FAIL REASON: "Stitch screen components exist but are not imported in render tree — inline duplicates detected"
      1.6. Completeness checks (CRITICAL - FAIL if any found):
         - grep -rE "coming soon|Coming Soon|placeholder|TODO.*implement|work in progress" --include="*.tsx" --include="*.ts" . → FAIL if found as visible UI text content
         - If stitch/DESIGN_MANIFEST.json exists: for each screen listed, verify a corresponding component or page implements it (search by title keywords). Missing screen = FAIL.
         - grep -rE "blue-[0-9]+/[0-9]+" components/ → WARN: likely hardcoded Tailwind color — check if it belongs in design-tokens instead
      1.7. UI Contract compliance (if stitch/UI_CONTRACT.json exists):
         - Read UI_CONTRACT.json and verify each element is implemented:
         - Navigation links → matching Route/page components exist
         - Buttons → matching onClick handlers exist (not empty)
         - Inputs → controlled state (onChange + value/checked)
         - package.json dependencies match contract requirements (router, DnD)
         - Hardcoded demo names replaced with dynamic props/state
      2. Frontend design checks (if any .css/.tsx changed):
         - grep -rE "font-family.*system-ui|font-family.*Roboto|font-family.*Arial|font-family.*Inter" src/ → FAIL if found (banned fonts)
         - grep -rE "fonts\.googleapis\.com|next/font" src/ → FAIL if missing (no font import)
         - grep -rE "\-\-font-heading|\-\-font-body" src/ → FAIL if missing (no font vars)
         - grep -rE "transition:\s*all" src/ → FAIL if found
         - grep -rE "grid-cols-3" src/ → WARN (check asymmetry manually)
         If any FAIL → fix yourself, commit, push before proceeding
      3. Run lint: {{lint_cmd}} → fix any lint errors
      4. Run build: {{build_cmd}} → fix any build errors
      5. Run test: {{test_cmd}} → fix any test failures
      6. If you found issues and fixed them:
         git add -A && git commit -m "fix: quality + design improvements for {{current_story_id}}"
         git push


      STEP 3.5 — Runtime Smoke Test (MANDATORY for web projects):
      Run the Playwright smoke test to catch runtime errors, missing DOM elements,
      JS exceptions, and blank pages that unit tests and build checks miss.

      1. Run the smoke test:
         ```bash
         SMOKE_RESULT=$(node /home/setrox/.openclaw/setfarm-repo/scripts/smoke-test.mjs "{{repo}}" 2>&1)
         SMOKE_EXIT=$?
         echo "$SMOKE_RESULT"
         ```
      2. Parse the result:
         - If exit code 0 (pass): continue to STEP 4
         - If exit code 1 (failures found): read the failures array and FIX each issue
           - "JS Exception: ..." → find and fix the runtime error in code
           - "Console Error: ..." → fix missing imports, broken references, module issues
           - "Page appears blank" → ensure the app renders visible content
           After fixing: run lint+build+test, commit, push, then re-run smoke test
         - If exit code 2 (script error) or status "skip": continue to STEP 4 (non-web project)
      3. FAIL the verify step if smoke test fails after 2 fix attempts:
         STATUS: retry with ISSUES listing the smoke test failures

      STEP 4 — Rebase onto latest feature branch (prevents merge conflicts):
      1. git fetch origin
      2. git rebase origin/{{branch}}
      3. If rebase conflicts occur:
         - Read each conflicted file carefully
         - Resolve conflicts preserving BOTH the existing feature-branch code AND this story's changes
         - git add <resolved files> && git rebase --continue
         - If conflict is unresolvable: git rebase --abort and proceed to merge anyway
      4. Run lint: {{lint_cmd}} → fix errors
      5. Run build: {{build_cmd}} → fix errors
      6. Run test: {{test_cmd}} → fix failures
      7. git push --force-with-lease

      STEP 5 — Merge PR:
      1. gh pr comment "{{pr_url}}" --body "Verified: lint/build/test pass. Code quality checked."
      2. Merge with fallback:
         gh pr merge "{{pr_url}}" --squash --delete-branch || {
           echo "Merge failed — retrying after rebase"
           git fetch origin && git rebase origin/{{branch}}
           git push --force-with-lease
           gh pr merge "{{pr_url}}" --squash --delete-branch
         }
      3. Reply STATUS: done

      If build/test FAILS and you cannot fix:
      Reply STATUS: retry with issues list.

      ESCALATION MODE (retry count >= 3):
      If this story has been retried 3+ times, DO NOT send back to developer.
      Instead:
      1. Read ALL previous error output and verify feedback
      2. Fix the code YOURSELF — you have full access to the repo
      3. Run lint+build+test
      4. If you fix it → commit, push, merge PR → STATUS: done
      5. If you truly cannot fix it → STATUS: skip (story will be skipped, others continue)

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      VERIFIED: <what you confirmed>
      MERGED: true

      Or if issues found:
      STATUS: retry
      ISSUES:
      - <what's wrong>

      Or if escalation and unfixable:
      STATUS: skip
      REASON: <why this story cannot be completed>
      ============================================================
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 5
      on_exhausted:
        escalate_to: human


  - id: security-gate
    agent: security-gate
    input: |
      Scan the feature branch for security vulnerabilities.

      REPO: {{repo}}
      BRANCH: {{branch}}

      1. cd {{repo}} && git checkout {{branch}} && git pull
      2. Run: git diff main...HEAD
      3. Scan ALL changed files for:
         - Hardcoded secrets (API keys, tokens, passwords, .env values in code)
         - SQL injection (string concatenation in queries)
         - XSS (unsanitized user input in HTML/JSX)
         - Command injection (unsanitized input in exec/spawn)
         - Overly permissive operations (chmod 777, rm -rf /, wildcard deletes)
         - Missing input validation on API endpoints
         - Error handling leaking stack traces to users
         - Auth/authz bypasses
         - AI code smells (TODO placeholders, lorem ipsum, hardcoded test data in prod)
      4. Run project linters if available: {{lint_cmd}}
      5. Check for .env files in git: git ls-files | grep -i .env

      OUTPUT:
      - If clean: STATUS: done + SECURITY_REPORT: pass + SECURITY_NOTES: <summary>
      - If issues found but fixable: Fix them, commit, push, then STATUS: done
      - If critical unfixable issues: STATUS: retry + SECURITY_ISSUES: <list>

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      SECURITY_REPORT: <pass/warn>
      SECURITY_NOTES: <findings summary or "No issues found">
      ============================================================
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: final-test
    agent: tester
    input: |
      !include critical-preamble-short.md

      Integration testing on merged feature branch, then create final PR to main.

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}
      LINT_CMD: {{lint_cmd}}
      PROGRESS LOG: {{progress}}
      SECURITY_NOTES: {{security_notes}}

      === INTEGRATION TEST + PR WORKFLOW ===

      STEP 0 — Merge any remaining open story PRs (cleanup from verify failures):
      1. cd into {{repo}}
      2. git checkout {{branch}} && git pull origin {{branch}}
      3. Check for unmerged story PRs targeting this branch:
         OPEN_STORY_PRS=$(gh pr list --base {{branch}} --state open --json number,headRefName -q '.[].number' 2>/dev/null || echo "")
         for pr_num in $OPEN_STORY_PRS; do
           echo "Attempting to merge remaining PR #$pr_num"
           PR_BRANCH=$(gh pr view "$pr_num" --json headRefName -q '.headRefName')
           git fetch origin "$PR_BRANCH" 2>/dev/null || continue
           git checkout "$PR_BRANCH" 2>/dev/null || continue
           git rebase origin/{{branch}} || { git rebase --abort; git checkout {{branch}}; continue; }
           git push --force-with-lease 2>/dev/null || { git checkout {{branch}}; continue; }
           gh pr merge "$pr_num" --squash --delete-branch 2>/dev/null || true
           git checkout {{branch}} && git pull origin {{branch}}
         done
      4. git checkout {{branch}} && git pull origin {{branch}}

      STEP 1 — Verify:
      1. cd into {{repo}}
      2. git checkout {{branch}} && git pull origin {{branch}}
      3. Lint: {{lint_cmd}}
      4. Build: {{build_cmd}}
      5. Tests: {{test_cmd}}

      STEP 2 — Integration checks:
      1. Check cross-story integration issues
      2. Verify overall feature works as cohesive whole
      3. Fix any issues found, commit and push

      STEP 2.5 — Runtime Smoke Test (MANDATORY for web projects):
      1. Build the project: {{build_cmd}}
      2. Run smoke test:
         SMOKE_RESULT=$(node /home/setrox/.openclaw/setfarm-repo/scripts/smoke-test.mjs "{{repo}}" 2>&1)
         SMOKE_EXIT=$?
         echo "$SMOKE_RESULT"
      3. If smoke test fails (exit 1): fix each issue, rebuild, re-test
         If smoke test errors/skips (exit 2 or status "skip"): continue
      4. FAIL the final-test step if smoke test still fails after fixes

      STEP 3 — Create final PR to main AND merge:
      1. Create PR:
         FINAL_PR=$(gh pr create --base main --head {{branch}} --title "feat: complete {{branch}} feature" --body "Feature branch {{branch}} — all stories implemented and tested.")
         echo "Created final PR: $FINAL_PR"
      2. Merge: gh pr merge "$FINAL_PR" --squash --delete-branch
      3. Close orphan PRs:
         OPEN_PRS=$(gh pr list --base {{branch}} --state open --json number -q '.[].number')
         for pr_num in $OPEN_PRS; do gh pr close "$pr_num" --delete-branch 2>/dev/null || true; done

      If build/tests FAIL: fix issues, commit, push, retry. Only STATUS: retry if truly stuck.

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      RESULTS: <test outcomes>
      FINAL_PR: <URL>

      Or: STATUS: retry / FAILURES: <list>
      ============================================================
    expects: "STATUS: done"
    on_fail:
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: deploy
    agent: deployer
    input: |
      !include critical-preamble-short.md

      Deploy the completed project to production (if applicable).

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: main
      BUILD_CMD: {{build_cmd}}
      FINAL_PR: {{final_pr}}
      RUN_ID: {{run_id}}

      === STEP 0: CLASSIFY TASK TYPE ===

      Read the TASK description and REPO path carefully.
      Classify into one of these categories:

      CATEGORY A — NEW WEB PROJECT:
        Signals: new repo created during this run, task describes a new app/site/dashboard,
        repo is NOT already in ~/projects/, no existing systemd service for it.

      CATEGORY B — NEW MOBILE APP:
        Signals: package.json has react-native/expo/flutter dependency,
        task mentions "mobile", "React Native", "Expo", "Flutter", "iOS", "Android".

      CATEGORY C — EXISTING PROJECT UPDATE:
        Signals: repo is ALREADY under ~/projects/ (or ~/mobile/ for mobile),
        project is ALREADY registered in Mission Control
        (check: curl -s http://127.0.0.1:3080/api/projects | grep -q "$(basename {{repo}})")

      CATEGORY D — LIBRARY / SKILL / TOOL:
        Signals: task mentions "install", "kur", "library", "fork", "skill", "tool", "CLI",
        repo is under ~/libs/ or should be,
        no web server / no port / no frontend.

      CATEGORY E — NO DEPLOY NEEDED:
        Signals: task is purely analytical, documentation, or config change,
        no runnable artifact produced.

      ══════════════════════════════════════════════════════════
      Based on category, follow the matching path below.
      ══════════════════════════════════════════════════════════

      ┌─────────────────────────────────────────────────────────┐
      │              CATEGORY A: NEW WEB PROJECT                │
      └─────────────────────────────────────────────────────────┘

      A1 — Determine PORT (priority order — ALWAYS prefer existing port):
      1. Existing systemd service: grep -oP 'PORT=\K[0-9]+' ~/.config/systemd/user/$(basename REPO).service
      2. Existing server code or .env: grep PORT from REPO/server/index.ts or REPO/.env
      3. Task text ("port: XXXX" or "Frontend port: XXXX")
      4. Last resort only: PORT=$(curl -s http://127.0.0.1:3080/api/projects/next-port | jq -r '.port')
      CRITICAL: Never assign a new port if the service already has one configured.

      A2 — Move to ~/projects/:
      PROJECT_NAME=$(basename {{repo}})
      TARGET_DIR="/home/setrox/projects/$PROJECT_NAME"
      if [ "{{repo}}" != "$TARGET_DIR" ] && [ ! -d "$TARGET_DIR" ]; then
        mv {{repo}} $TARGET_DIR
        ln -sfn $TARGET_DIR {{repo}} 2>/dev/null || true
      fi
      REPO_DIR="$TARGET_DIR"

      A3 — Build:
      cd $REPO_DIR && npm install --production=false 2>/dev/null || true
      {{build_cmd}}

      A3.5 — Check for duplicate system-level service (CRITICAL):
      If a system-level service exists for this project, it MUST be disabled first:
        sudo systemctl is-active ${PROJECT_NAME}.service 2>/dev/null && sudo systemctl disable --now ${PROJECT_NAME}.service
        sudo rm -f /etc/systemd/system/${PROJECT_NAME}.service 2>/dev/null
        sudo systemctl daemon-reload 2>/dev/null
      This prevents port conflicts and restart loops from having both system and user services.

      A4 — Create systemd service:
      Detect type from project files:
        - next.config with output:'export' → STATIC: serve dist -l $PORT -s
        - next.config without export → NEXTJS: npx next start -p $PORT
        - server/dist/index.js or dist/index.js → NODEJS: node dist/index.js
        - Fallback → npm start with PORT env

      Write ~/.config/systemd/user/${PROJECT_NAME}.service:
      ```
      [Unit]
      Description=$PROJECT_NAME
      After=network.target

      [Service]
      Type=simple
      WorkingDirectory=$REPO_DIR
      ExecStart=<based on type above>
      Restart=on-failure
      RestartSec=5
      Environment=NODE_ENV=production

      [Install]
      WantedBy=default.target
      ```
      systemctl --user daemon-reload && systemctl --user enable --now ${PROJECT_NAME}.service

      A5 — Health check:
      sleep 3
      curl -sf http://127.0.0.1:$PORT/ > /dev/null || (journalctl --user -u ${PROJECT_NAME}.service -n 20 --no-pager; fix and retry)

      A6 — Register in Mission Control (MANDATORY — verify it worked):
      GITHUB_URL=$(cd $REPO_DIR && git remote get-url origin 2>/dev/null | sed 's/.git$//' || echo "")
      GITHUB_SLUG=$(echo "$GITHUB_URL" | sed 's|https://github.com/||')
      # Detect stack from package.json
      STACK_JSON=$(cd $REPO_DIR && node -e "const p=require('./package.json'); const d={...p.dependencies,...p.devDependencies}; const s=[]; if(d.react)s.push('React'); if(d.next)s.push('Next.js'); if(d.express)s.push('Express'); if(d.vite)s.push('Vite'); if(d.typescript)s.push('TypeScript'); if(d.tailwindcss||d['@tailwindcss/postcss'])s.push('Tailwind CSS'); console.log(JSON.stringify(s))" 2>/dev/null || echo '[]')

      # Step 1: Create project
      curl -sf -X POST http://127.0.0.1:3080/api/projects         -H 'Content-Type: application/json'         -d "{"name":"$PROJECT_NAME","description":"{{task}}","repo":"$REPO_DIR","port":$PORT,"domain":"${PROJECT_NAME}.setrox.com.tr","github":"$GITHUB_SLUG"}"

      # Step 2: Verify registration — FAIL if not found
      MC_CHECK=$(curl -sf http://127.0.0.1:3080/api/projects/$PROJECT_NAME 2>/dev/null | grep -c '"id"' || echo "0")
      if [ "$MC_CHECK" = "0" ]; then
        echo "ERROR: MC registration failed — project not found after POST. Retrying..."
        curl -sf -X POST http://127.0.0.1:3080/api/projects           -H 'Content-Type: application/json'           -d "{"name":"$PROJECT_NAME","description":"{{task}}","repo":"$REPO_DIR","port":$PORT,"domain":"${PROJECT_NAME}.setrox.com.tr","github":"$GITHUB_SLUG"}"
      fi

      A7 — Cloudflare Tunnel + DNS:
      HOSTNAME="${PROJECT_NAME}.setrox.com.tr"
      CF_TUNNEL_ID="92d8df83-3623-4850-ba41-29126106d020"
      GUARDRAIL: HOSTNAME must be simple like "space-shooter.setrox.com.tr" (no path segments like repo/projects/fr).
      If HOSTNAME contains more than one hyphen-separated word before .setrox.com.tr, you are doing it WRONG.
      HOSTNAME must equal "{{repo}}.setrox.com.tr" — nothing else. Do NOT derive it from the full path.

      a) Add tunnel ingress + DNS (MUST use this script, never edit config.yml directly):
      sudo bash /home/setrox/.openclaw/scripts/tunnel-add.sh "$HOSTNAME" "$PORT"
      This script safely: adds ingress rule, validates YAML, rolls back on error,
      restarts cloudflared, and creates DNS CNAME.
      IMPORTANT: Do NOT manually edit /etc/cloudflared/config.yml or use sed on it.

      c) Cloudflare Access is already configured as wildcard (*.setrox.com.tr).
         New subdomains are automatically protected — no per-project action needed.

      → OUTPUT: DEPLOY_TYPE=new-web, all fields filled.

      ┌─────────────────────────────────────────────────────────┐
      │              CATEGORY B: NEW MOBILE APP                 │
      └─────────────────────────────────────────────────────────┘

      B1 — Move to ~/mobile/:
      TARGET_DIR="/home/setrox/mobile/$PROJECT_NAME"
      Move if not already there (same logic as A2).

      B2 — Install deps:
      cd $REPO_DIR && npm install 2>/dev/null || true

      B3 — Register in Mission Control:
      POST → type "mobile", emoji "📱"
      PATCH → repo, stack, github, workflowRunId, createdBy, completedAt
      (NO ports, NO service, NO domain)

      → OUTPUT: DEPLOY_TYPE=new-mobile, SERVICE_NAME=none, PORT=none, DOMAIN=none.

      ┌─────────────────────────────────────────────────────────┐
      │           CATEGORY C: EXISTING PROJECT UPDATE           │
      └─────────────────────────────────────────────────────────┘

      C1 — Pull latest and rebuild:
      cd {{repo}} && git checkout main && git pull
      {{build_cmd}}

      C2 — Restart service (if web):
      SERVICE_NAME=$(basename {{repo}}).service
      systemctl --user restart $SERVICE_NAME 2>/dev/null || true

      C3 — Health check (if web):
      Detect port from MC: curl -s http://127.0.0.1:3080/api/projects/$(basename {{repo}}) | jq '.ports.frontend'
      curl -sf http://127.0.0.1:$PORT/ > /dev/null

      C4 — Update MC metadata (ALWAYS update, even if project exists):
      PROJECT_NAME=$(basename {{repo}})
      GITHUB_URL=$(cd {{repo}} && git remote get-url origin 2>/dev/null | sed 's/.git$//' || echo "")
      GITHUB_SLUG=$(echo "$GITHUB_URL" | sed 's|https://github.com/||')
      SERVICE_NAME="${PROJECT_NAME}.service"
      STACK_JSON=$(cd {{repo}} && node -e "const p=require('./package.json'); const d={...p.dependencies,...p.devDependencies}; const s=[]; if(d.react)s.push('React'); if(d.next)s.push('Next.js'); if(d.express)s.push('Express'); if(d.vite)s.push('Vite'); if(d.typescript)s.push('TypeScript'); if(d.tailwindcss||d['@tailwindcss/postcss'])s.push('Tailwind CSS'); console.log(JSON.stringify(s))" 2>/dev/null || echo '[]')
      
      # Check if project exists in MC; if not, register it first
      MC_CHECK=$(curl -sf http://127.0.0.1:3080/api/projects/$PROJECT_NAME 2>/dev/null | grep -c '"id"' || echo "0")
      if [ "$MC_CHECK" = "0" ]; then
        echo "Project not in MC — registering..."
        curl -sf -X POST http://127.0.0.1:3080/api/projects \
          -H 'Content-Type: application/json' \
          -d '{"name":"'$PROJECT_NAME'","description":"{{task}}","repo":"{{repo}}","domain":"'$PROJECT_NAME'.setrox.com.tr","github":"'$GITHUB_SLUG'"}'
      fi
      
      # ALWAYS PATCH with current port, service, stack, checklist
      # This ensures MC is complete even if project was pre-registered by setup step
      curl -sf -X PATCH http://127.0.0.1:3080/api/projects/$PROJECT_NAME \
        -H 'Content-Type: application/json' \
        -d '{"ports":{"frontend":'$PORT'},"service":"'$PROJECT_NAME'","serviceStatus":"running","stack":'$STACK_JSON',"checklist":[{"id":"task-received","label":"Gorev iletildi","completed":true},{"id":"github-repo","label":"GitHub repo olusturuldu","completed":true},{"id":"dns-setup","label":"Cloudflare DNS ve subdomain olusturuldu","completed":true},{"id":"added-to-projects","label":"Projeler bolumune eklendi","completed":true},{"id":"ports-assigned","label":"Portlar belirlendi","completed":true},{"id":"setup-run","label":"Setup calistirildi","completed":true},{"id":"dev-started","label":"Gelistirici calismaya basladi","completed":true},{"id":"test-review","label":"Test ve review tamamlandi","completed":true}]}'
      
      # Verify PATCH worked
      MC_PORT=$(curl -sf http://127.0.0.1:3080/api/projects/$PROJECT_NAME 2>/dev/null | python3 -c "import json,sys; p=json.load(sys.stdin); print(p.get('ports',{}).get('frontend',''))" 2>/dev/null || echo "")
      if [ -z "$MC_PORT" ] || [ "$MC_PORT" = "None" ]; then
        echo "WARNING: MC PATCH may have failed — port not set after update"
      else
        echo "MC updated: port=$MC_PORT, service=$PROJECT_NAME"
      fi
      
      → OUTPUT: DEPLOY_TYPE=update, existing service restarted.

      ┌─────────────────────────────────────────────────────────┐
      │           CATEGORY D: LIBRARY / SKILL / TOOL            │
      └─────────────────────────────────────────────────────────┘

      D1 — Ensure correct location:
      If repo is NOT under ~/libs/, move it there:
        TARGET_DIR="/home/setrox/libs/$PROJECT_NAME"
        mv {{repo}} $TARGET_DIR 2>/dev/null || true

      D2 — Install/build if needed:
      cd $TARGET_DIR
      npm install 2>/dev/null || pip install -e . 2>/dev/null || true
      If build script exists: run it.

      D3 — NO Mission Control registration (libs are not projects).
      D4 — NO systemd service, NO tunnel, NO port.

      → OUTPUT: DEPLOY_TYPE=library, SERVICE_NAME=none, PORT=none, DOMAIN=none, MC_PROJECT_ID=none.

      ┌─────────────────────────────────────────────────────────┐
      │            CATEGORY E: NO DEPLOY NEEDED                 │
      └─────────────────────────────────────────────────────────┘

      Nothing to deploy. Just report done.

      → OUTPUT: DEPLOY_TYPE=skip, all fields "none".

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      DEPLOY_TYPE: <new-web|new-mobile|update|library|skip>
      SERVICE_NAME: <name.service|none>
      SERVICE_STATUS: <active|restarted|none>
      PORT: <number|none>
      DOMAIN: <hostname.setrox.com.tr|none>
      MC_PROJECT_ID: <id|none>
      HEALTH_CHECK: <200|n/a>
      DEPLOY_NOTES: <summary of what was done>

      Or if deployment fails:
      STATUS: retry
      DEPLOY_ERRORS:
      - <what went wrong>
      ============================================================
    expects: "STATUS: done"
    max_retries: 3
    on_fail:
      escalate_to: human

