         - No TODOs, no placeholders, no shortcuts
         - Use REALISTIC demo content: real Turkish names (Elif Yılmaz, Ahmet Kaya), real-looking emails (elif@reelforge.com), meaningful descriptions. NEVER use John Doe, Jane Smith, Lorem ipsum, test@test.com, foo@bar, example@, dummy, sample data. If data will come from API later, use realistic placeholder that looks like production.

      5-7. SELF-FIX LOOP (up to 3 cycles — do NOT give up after first failure):
         for CYCLE in 1 2 3; do
           echo "=== Verification cycle $CYCLE ==="
           LINT_OK=true; BUILD_OK=true; TEST_OK=true

           # Lint — always auto-fix first, then check
           npx eslint --fix "src/**/*.{ts,tsx}" 2>/dev/null || npx eslint --fix "app/**/*.{ts,tsx}" 2>/dev/null || true
           {{lint_cmd}} 2>&1 || { LINT_OK=false; echo "Lint failed after auto-fix — manual fix needed"; }
           if [ "$LINT_OK" = "false" ]; then
             LINT_OUT=$({{lint_cmd}} 2>&1) || true
             echo "$LINT_OUT"
             # Read each error line (file:line:col error message), open the file, fix the issue
             # Common fixes: remove unused imports, add missing types, fix naming
           fi

           # Build
           {{build_cmd}} 2>&1 || { BUILD_OK=false; echo "Build failed — fixing..."; }
           if [ "$BUILD_OK" = "false" ]; then
             BUILD_OUT=$({{build_cmd}} 2>&1) || true
             echo "$BUILD_OUT"
             # Common fix patterns:
             # "Cannot find module 'vitest'" → exclude test files from tsconfig build:
             #   Add "exclude": ["src/**/*.test.ts", "src/**/*.test.tsx"] to tsconfig.json
             #   OR add "types": ["vitest/globals"] to compilerOptions
             # "Cannot find module 'X'" → npm install X in {{repo}}
             # "'X' is declared but never used" → remove unused import
             # Fix each error, then re-run build
           fi

           # Test
           {{test_cmd}} 2>&1 || { TEST_OK=false; echo "Tests failed — fixing..."; }
           if [ "$TEST_OK" = "false" ]; then
             TEST_OUT=$({{test_cmd}} 2>&1) || true
             echo "$TEST_OUT"
             # Read failing test output and fix the code or tests
           fi

           if [ "$LINT_OK" = "true" ] && [ "$BUILD_OK" = "true" ] && [ "$TEST_OK" = "true" ]; then
             echo "All checks pass on cycle $CYCLE"
             break
           fi

           if [ "$CYCLE" = "3" ]; then
             echo "WARNING: Still failing after 3 fix cycles — committing best effort"
           fi
         done

         IMPORTANT: Do NOT report STATUS: retry just because lint/build/test failed once.
         You MUST attempt to fix the issue yourself. Read the error output carefully,
         identify the root cause, edit the file, and re-run. Only report STATUS: retry
