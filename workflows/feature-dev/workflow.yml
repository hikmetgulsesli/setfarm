      2. git fetch origin
      3. Try rebase:
         git rebase origin/{{branch}} 2>&1
         REBASE_EXIT=$?
      4. If rebase succeeds (exit 0): continue to lint/build/test
      5. If rebase conflicts occur (exit != 0):
         a. Check conflicted files: git diff --name-only --diff-filter=U
         b. For each conflicted file:
            - If it's package.json: accept theirs (feature branch), then re-add your dependency changes
              git checkout --theirs package.json && git add package.json
            - If it's a shared type file (types/*.ts): merge both additions manually
            - For other files: read carefully, keep BOTH changes where possible
         c. git add <resolved files> && git rebase --continue
         d. If rebase is still stuck after 2 attempts:
            git rebase --abort
            # Fall back to merge instead of rebase
            git merge origin/{{branch}} --no-edit 2>&1 || {
              # If merge also conflicts, resolve the same way
              git checkout --theirs package.json 2>/dev/null && git add package.json 2>/dev/null
              git checkout --theirs package-lock.json 2>/dev/null && git add package-lock.json 2>/dev/null
              git add -A && git commit --no-edit 2>/dev/null || true
            }
      5. Run lint: {{lint_cmd}} → fix errors
      6. Kill stale build processes before running build:
         pkill -f "next build" 2>/dev/null || true
         sleep 1
         Run build: {{build_cmd}} → fix errors
      7. Run test: {{test_cmd}} → fix failures
      8. git push origin {{branch}} --force-with-lease

      STEP 5 — Merge PR:
      1. Ensure PR exists:
         FINAL_PR="{{final_pr}}"
         if [ -z "$FINAL_PR" ]; then
           echo "No final_pr in context — creating PR from feature branch"
           FINAL_PR=$(gh pr create --base main --head {{branch}}              --title "feat: {{task}}"              --body "Combined feature implementation — auto-created by verify step" 2>/dev/null || echo "")
           if [ -z "$FINAL_PR" ]; then
             FINAL_PR=$(gh pr list --head {{branch}} --base main --state open --json url --jq '.[0].url' 2>/dev/null || echo "")
           fi
         fi
         if [ -z "$FINAL_PR" ]; then
           echo "WARNING: Could not find or create PR — continuing anyway"
         fi
      2. If PR is open, merge it:
         if [ -n "$FINAL_PR" ]; then
           FINAL_PR_STATE=$(gh pr view "$FINAL_PR" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
           if [ "$FINAL_PR_STATE" = "MERGED" ]; then
             echo "PR already merged — nothing to do"
           elif [ "$FINAL_PR_STATE" = "OPEN" ]; then
             gh pr comment "$FINAL_PR" --body "Verified: lint/build/test pass." 2>/dev/null || true
             gh pr merge "$FINAL_PR" --squash --delete-branch 2>/dev/null || {
               echo "Squash merge failed — trying merge commit"
               gh pr merge "$FINAL_PR" --merge --delete-branch 2>/dev/null || true
             }
           fi
         fi
      3. Verify PR is actually merged:
         if [ -n "$FINAL_PR" ]; then
           MERGED_STATE=$(gh pr view "$FINAL_PR" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
           if [ "$MERGED_STATE" != "MERGED" ]; then
             echo "WARNING: PR state is $MERGED_STATE after merge attempt"
             gh pr merge "$FINAL_PR" --squash --delete-branch 2>/dev/null || gh pr merge "$FINAL_PR" --merge --delete-branch 2>/dev/null || echo "PR merge failed"
           fi
         fi
      4. Reply STATUS: done

      If build/test FAILS and you cannot fix:
      Reply STATUS: retry with issues list.

      ESCALATION MODE (retry count >= 3):
      If retried 3+ times:
      1. Read ALL previous error output
      2. Fix the code YOURSELF — you have full access to the repo
      3. Run lint+build+test
      4. If you fix it → commit, push, merge PR → STATUS: done
      5. If you truly cannot fix it → STATUS: skip

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      VERIFIED: <what you confirmed>
      MERGED: true

      Or if issues found:
      STATUS: retry
      ISSUES:
      - <what's wrong>

      Or if unfixable:
      STATUS: skip
      REASON: <why>
      ============================================================
    expects: "STATUS: done"
    max_retries: 5
    on_fail:
      escalate_to: human


  - id: security-gate
    agent: security-gate
    input: |
      Scan the feature branch for security vulnerabilities.

      REPO: {{repo}}
      BRANCH: {{branch}}

      1. cd {{repo}} && git checkout {{branch}} && git pull
      2. Run: git diff main...HEAD
      3. Scan ALL changed files for:
         - Hardcoded secrets (API keys, tokens, passwords, .env values in code)
         - SQL injection (string concatenation in queries)
         - XSS (unsanitized user input in HTML/JSX)
         - Command injection (unsanitized input in exec/spawn)
         - Overly permissive operations (chmod 777, rm -rf /, wildcard deletes)
         - Missing input validation on API endpoints
         - Error handling leaking stack traces to users
         - Auth/authz bypasses
         - AI code smells (TODO placeholders, lorem ipsum, hardcoded test data in prod)
      4. Run project linters if available: {{lint_cmd}}
      5. Check for .env files in git: git ls-files | grep -i .env

      OUTPUT:
      - If clean: STATUS: done + SECURITY_REPORT: pass + SECURITY_NOTES: <summary>
      - If issues found but fixable: Fix them, commit, push, then STATUS: done
      - If critical unfixable issues: STATUS: retry + SECURITY_ISSUES: <list>

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      SECURITY_REPORT: <pass/warn>
      SECURITY_NOTES: <findings summary or "No issues found">
      ============================================================
    expects: "STATUS: done"
    on_fail:
      retry_step: implement
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: qa-test
    agent: qa-tester
    input: |
      !include critical-preamble.md

      Perform comprehensive browser-based QA testing on the deployed application.
      Test EVERY screen from the Stitch design manifest.

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}

      === SETUP ===

      1. cd {{repo}} && git checkout {{branch}} && git pull
      2. Read stitch/DESIGN_MANIFEST.json → list all screens
      3. Read stitch/design-tokens.css → expected colors, fonts
      4. Read .env.test or .env.local or .env → TEST_EMAIL, TEST_PASSWORD
      5. Build: {{build_cmd}}
      6. Start dev server (find available port, start in background):
         PORT=$(shuf -i 9200-9299 -n 1)
         npx next start -p $PORT &
         SERVER_PID=$!
         sleep 5
      7. Open browser: agent-browser open http://localhost:$PORT

      === AUTH ===

      If login page is detected:
      1. agent-browser fill 'input[type="email"]' "$TEST_EMAIL"
      2. agent-browser fill 'input[type="password"]' "$TEST_PASSWORD"
      3. agent-browser click 'button[type="submit"]'
      4. Wait 3 seconds, verify redirect to dashboard/home
      If no login page → skip

      === SCREEN-BY-SCREEN TESTING ===

      For EACH screen in DESIGN_MANIFEST.json:

      A. NAVIGATION
         - Determine the route for this screen (from screen name/type mapping)
         - agent-browser open http://localhost:$PORT/<route>
         - Wait 2 seconds for page load
         - agent-browser screenshot {{repo}}/qa-screenshots/<screen-name>.png

      B. PAGE EXISTENCE CHECK
         - agent-browser snapshot → check for headings, buttons, or content
         - If page is blank or shows 404 → CRITICAL: "Screen '<name>' has no corresponding page"

      C. STITCH DESIGN COMPLIANCE
         - Read stitch/<screenFile>.html for this screen
         - Count sections/cards in Stitch HTML vs actual page DOM
         - agent-browser eval: check computed font-family matches design-tokens.css
         - agent-browser eval: check computed primary color matches design-tokens.css
         - agent-browser eval: check for emoji icons (BANNED — must use SVG/icon-font)
         - Report differences as HIGH severity

      D. BUTTON TESTING (max 10 buttons per page)
         - agent-browser snapshot → list all buttons
         - For each button:
           * Inject collectors via agent-browser eval:
             window.__qa_net=[];window.__qa_err=[];
             var origFetch=window.fetch;
             window.fetch=function(){var a=arguments;return origFetch.apply(this,a).then(function(r){window.__qa_net.push({url:String(a[0]),status:r.status});return r})};
             window.addEventListener("error",function(e){window.__qa_err.push(e.message)});
           * agent-browser click '<button selector>'
           * Wait 2 seconds for async response
           * Check: DOM changed (new elements/text), OR network request fired, OR modal opened
           * Check: no 4xx/5xx in window.__qa_net
           * Check: no JS errors in window.__qa_err
           * If button did nothing → HIGH: "Button '<text>' is non-functional"
           * If button caused 5xx → CRITICAL: "Button '<text>' causes server error"

      E. FORM TESTING (if forms found on page)
         - agent-browser snapshot → list all input fields
         - Fill each input with realistic Turkish test data:
           * email: "test@firma.com.tr"
           * text/name: "Test Musteri A.S."
           * number/currency: "15000"
           * date: today's date
           * select: pick first non-placeholder option
           * textarea: "QA test aciklamasi — bu alan otomatik doldurulmustur."
         - Click submit button
         - Wait 3 seconds
         - Check: page redirected, OR success toast appeared, OR error message shown
         - Check: no 5xx responses in network
         - If form does nothing on submit → CRITICAL: "Form submit is non-functional"

      F. MOCK DATA DETECTION
         - agent-browser eval: scan all visible text on page for:
           * English placeholder names: "John Doe", "Jane Smith", "Acme Corp"
           * Lorem ipsum text
           * Test emails: "test@test.com", "user@example.com"
           * Placeholder text: "Coming soon", "TODO", "placeholder", "yakinda", "lorem"
           * Empty tables/lists (0 data rows but should have data)
         - If found → CRITICAL: "Mock/placeholder data detected: '<matched text>'"

      G. LINK VALIDATION
         - agent-browser snapshot → list all internal links (same origin)
         - For each unique internal link (max 15):
           * Navigate to link href
           * Check: not 404, not blank page
           * Navigate back
         - Report broken links as HIGH severity

      H. CONSOLE ERROR CHECK
         - agent-browser eval: check for console errors collected during testing
         - Report uncaught errors as MEDIUM severity

      === CROSS-PAGE TESTS ===

      1. CRUD FLOW (if applicable — check if create/edit forms exist):
         - Navigate to list page
         - Click "Create/Ekle/Yeni" button
         - Fill form with test data, submit
         - Verify entity appears in list
         - Click entity to go to detail page
         - Click "Edit/Duzenle" button
         - Modify a field, save
         - Verify change persisted
         - Report issues

      2. NAVIGATION CONSISTENCY:
         - Visit 5 different pages
         - Verify sidebar/navbar is identical on each page
         - Report inconsistencies as HIGH

      3. DARK MODE (if theme toggle exists):
         - Find and click theme toggle
         - Visit 3 different pages
         - Check for white backgrounds or unreadable text on dark bg
         - Switch back to default theme
         - Report issues as MEDIUM

      === FIX CYCLE (MANDATORY if CRITICAL/HIGH issues found, max 2 rounds) ===

      After completing all screen tests, if you found CRITICAL or HIGH issues
      (non-functional buttons, broken forms, missing wiring, dead clicks):

      ROUND 1:
      1. For each CRITICAL/HIGH issue:
         a. Read the source file containing the broken element
         b. Identify the root cause:
            - Missing onClick/onSubmit handler
            - Handler exists but empty or no-op
            - Modal/dialog component not rendered
            - State not connected to UI
            - Event handler not imported or wired
         c. Fix the code: add the missing wiring, connect handlers, render components
         d. Keep fixes minimal: just make the feature work, no refactoring
      2. git add -A && git commit -m "qa: fix non-functional UI elements" && git push
      3. Rebuild: {{build_cmd}}
      4. Restart dev server, re-test ONLY the previously broken elements
      5. Update issue status in QA_REPORT.md (FIXED or STILL_BROKEN)

      ROUND 2 (only if Round 1 left unresolved issues):
      1. Re-examine the code with fresh eyes
      2. Try alternative fix approach
      3. Rebuild, re-test, commit, push
      4. If still broken: mark as UNRESOLVED in report, continue

      CRITICAL: Do NOT skip this cycle. Finding bugs without fixing them is NOT acceptable.
      You have coding access. READ the code, UNDERSTAND the bug, FIX it, TEST it.

            === CLEANUP ===

      1. agent-browser close
      2. kill $SERVER_PID (if started)

      === REPORT ===

      Write {{repo}}/QA_REPORT.md with this structure:

      # QA Test Report
      **Date**: <date>
      **Branch**: {{branch}}
      **Screens Tested**: <N>/<total from DESIGN_MANIFEST>
      **Issues Found**: <N>

      ## Summary
      | Severity | Count |
      |----------|-------|
      | CRITICAL | X |
      | HIGH     | X |
      | MEDIUM   | X |
      | LOW      | X |

      ## Screen Results
      | # | Screen | Route | Status | Issues |
      |---|--------|-------|--------|--------|
      | 1 | Screen Name | /route | PASS/FAIL | count |
      ...

      ## Issues Detail
      ### CRITICAL
      1. [Page Name] Description of issue
      ...
      ### HIGH
      1. [Page Name] Description of issue
      ...

      Then: git add QA_REPORT.md qa-screenshots/ && git commit -m "qa: browser test report" && git push

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      QA_CRITICAL_COUNT: <number>
      QA_HIGH_COUNT: <number>
      QA_TOTAL_ISSUES: <number>
      QA_SCREENS_TESTED: <number>
      QA_SCREENS_PASSED: <number>
      QA_REPORT: |
        <full report text — include all screen results and issues>
      ============================================================
    expects: "STATUS: done"
    max_retries: 1
    on_fail:
      escalate_to: human

  - id: final-test
    agent: tester
    input: |
      !include critical-preamble.md

      Integration testing on merged feature branch, then create final PR to main.

      CRITICAL IDENTITY RULE:
      You are a QA TESTER, NOT a security scanner. Do NOT run security scans,
      vulnerability checks, or dependency audits. The security-gate step already
      did that. Your ONLY job is:
      1. Integration testing (lint, build, test)
      2. Runtime smoke test via smoke-test.mjs (MANDATORY)
      3. Create final PR to main

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}
      BUILD_CMD: {{build_cmd}}
      TEST_CMD: {{test_cmd}}
      LINT_CMD: {{lint_cmd}}
      PROGRESS LOG: {{progress}}
      SECURITY_NOTES: {{security_notes}}

      === INTEGRATION TEST + PR WORKFLOW ===

      STEP 0 — Merge any remaining open story PRs (cleanup from verify failures):
      1. cd into {{repo}}
      2. git checkout {{branch}} && git pull origin {{branch}}
      3. Check for unmerged story PRs targeting this branch:
         OPEN_STORY_PRS=$(gh pr list --base {{branch}} --state open --json number,headRefName -q '.[].number' 2>/dev/null || echo "")
         for pr_num in $OPEN_STORY_PRS; do
           echo "Attempting to merge remaining PR #$pr_num"
           PR_BRANCH=$(gh pr view "$pr_num" --json headRefName -q '.headRefName')
           git fetch origin "$PR_BRANCH" 2>/dev/null || continue
           git checkout "$PR_BRANCH" 2>/dev/null || continue
           git rebase origin/{{branch}} || { git rebase --abort; git checkout {{branch}}; continue; }
           git push --force-with-lease 2>/dev/null || { git checkout {{branch}}; continue; }
           gh pr merge "$pr_num" --squash --delete-branch 2>/dev/null || true
           git checkout {{branch}} && git pull origin {{branch}}
         done
      4. git checkout {{branch}} && git pull origin {{branch}}

      STEP 1 — Verify:
      1. cd into {{repo}}
      2. git checkout {{branch}} && git pull origin {{branch}}
      3. Lint: {{lint_cmd}}
      4. Build: {{build_cmd}}
      5. Tests: {{test_cmd}}

      STEP 2 — Integration wiring verification (CRITICAL):
      1. Check cross-story integration issues
      2. Verify ALL components in src/components/ are actually imported and rendered:
         - List all .tsx/.jsx files in src/components/ (exclude index, types, utils)
         - For each component, verify it appears in at least one page/layout import
         - If a component exists but is never imported, it is DEAD CODE — wire it in
      3. Verify ALL routes are functional:
         - Check src/app/*/page.tsx (or pages/*.tsx) — each must render real content
         - No route should show placeholder text (Coming soon, TODO, Game Started!, etc.)
      4. Verify interactive elements work:
         - Buttons must trigger real state changes, not show static placeholder text
         - Navigation links must lead to real pages
         - Canvas/game elements must render actual content after interaction
      5. Fix any issues found, commit and push

      STEP 2.5 — Runtime Smoke Test v2 (MANDATORY — NOT OPTIONAL):
      This is the MOST IMPORTANT step. Without smoke test output, the step CANNOT pass.
      Do NOT replace this with a security scan. Run the actual smoke-test.mjs script.
      1. Build the project: {{build_cmd}}
      2. Run smoke test:
         SMOKE_RESULT=$(node $HOME/.openclaw/setfarm-repo/scripts/smoke-test.mjs "{{repo}}" 2>&1)
         SMOKE_EXIT=$?
         echo "$SMOKE_RESULT"
      3. The smoke test checks:
         - Every discovered route (not just /)
         - Button clicks and state transitions
         - Placeholder content detection (Coming soon, Game Started!, TODO, etc.)
         - Component wiring (files in src/components/ that are never imported)
         - Canvas presence after Start/Play buttons
      4. If smoke test fails (exit 1): READ the failures JSON carefully, fix EACH issue:
         - PLACEHOLDER failures: replace static text with actual component rendering
         - WIRING failures: import and render the unused component in the correct page
         - JS Exception: fix the runtime error
         - Blank page: check route rendering
         Rebuild and re-test after each fix.
      5. If smoke test errors/skips (exit 2 or status "skip"): continue
      6. FAIL the final-test step if smoke test still fails after fixes

      STEP 3 — Create final PR to main AND merge:
      1. Create PR:
         FINAL_PR=$(gh pr create --base main --head {{branch}} --title "feat: complete {{branch}} feature" --body "Feature branch {{branch}} — all stories implemented and tested.")
         echo "Created final PR: $FINAL_PR"
      2. Merge: gh pr merge "$FINAL_PR" --squash --delete-branch
      3. Close orphan PRs:
         OPEN_PRS=$(gh pr list --base {{branch}} --state open --json number -q '.[].number')
         for pr_num in $OPEN_PRS; do gh pr close "$pr_num" --delete-branch 2>/dev/null || true; done

      If build/tests FAIL: fix issues, commit, push, retry. Only STATUS: retry if truly stuck.

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      RESULTS: <test outcomes>
      SMOKE_TEST_RESULT: <pass/fail/skip/error>
      FINAL_PR: <URL>

      Or: STATUS: retry / FAILURES: <list>
      IMPORTANT: If SMOKE_TEST_RESULT key is missing, step will be retried.
      ============================================================
    expects: "STATUS: done"
    on_fail:
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: deploy
    agent: deployer
    input: |
      !include critical-preamble.md

      Deploy the completed project to production (if applicable).

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: main
      BUILD_CMD: {{build_cmd}}
      FINAL_PR: {{final_pr}}
      RUN_ID: {{run_id}}

      === STEP 0: CLASSIFY TASK TYPE ===

      Read the TASK description and REPO path carefully.
      Classify into one of these categories:

      CATEGORY A — NEW WEB PROJECT:
        Signals: new repo created during this run, task describes a new app/site/dashboard,
        repo is NOT already in ~/projects/, no existing systemd service for it.

      CATEGORY B — NEW MOBILE APP:
        Signals: package.json has react-native/expo/flutter dependency,
        TECH_STACK is "react-native" or "expo",
        task mentions "mobile", "React Native", "Expo", "Flutter", "iOS", "Android".

      CATEGORY C — EXISTING PROJECT UPDATE:
        Signals: repo is ALREADY under ~/projects/ (or ~/mobile/ for mobile),
        project is ALREADY registered in Mission Control
        (check: curl -s http://127.0.0.1:3080/api/projects | grep -q "$(basename {{repo}})")

      CATEGORY D — LIBRARY / SKILL / TOOL:
        Signals: task mentions "install", "kur", "library", "fork", "skill", "tool", "CLI",
        repo is under ~/libs/ or should be,
        no web server / no port / no frontend.

      CATEGORY E — NO DEPLOY NEEDED:
        Signals: task is purely analytical, documentation, or config change,
        no runnable artifact produced.

      ══════════════════════════════════════════════════════════
      Based on category, follow the matching path below.
      ══════════════════════════════════════════════════════════

      ┌─────────────────────────────────────────────────────────┐
      │              CATEGORY A: NEW WEB PROJECT                │
      └─────────────────────────────────────────────────────────┘

      A1 — Determine PORT (priority order — ALWAYS prefer existing port):
      1. Existing systemd service: grep -oP 'PORT=\K[0-9]+' ~/.config/systemd/user/$(basename REPO).service
      2. Existing server code or .env: grep PORT from REPO/server/index.ts or REPO/.env
      3. Task text ("port: XXXX" or "Frontend port: XXXX")
      4. Last resort only: PORT=$(curl -s http://127.0.0.1:3080/api/projects/next-port | jq -r '.port')
      CRITICAL: Never assign a new port if the service already has one configured.
      PORT GUARDRAIL: After determining PORT, validate it follows the convention:
        - Frontend ports MUST be in range 3500-3599 (e.g. 3536, 3549)
        - Backend ports MUST be in range 4500-4599 (e.g. 4519)
        - REJECT framework defaults: 5173 (Vite), 3000 (Next.js/Express/CRA), 4200 (Angular),
          8080 (generic), 8000 (Django/FastAPI), 4000 (Remix), 1234 (Parcel), 8888 (Jupyter),
          5000 (Flask), 8001 (uvicorn), 9000 (PHP), 4321 (Astro), 5500 (LiveServer),
          ANY port outside 3500-3599 (frontend) or 4500-4599 (backend) range
        - If PORT is outside the valid range or is a framework default, OVERRIDE it:
          PORT=$(curl -s http://127.0.0.1:3080/api/projects/next-port | jq -r ".port")
        - Also fix any hardcoded port in the project: package.json scripts, vite.config, .env, server files.

      A2 — Move to ~/projects/:
      PROJECT_NAME=$(basename {{repo}})
      TARGET_DIR="$HOME/projects/$PROJECT_NAME"
      if [ "{{repo}}" != "$TARGET_DIR" ] && [ ! -d "$TARGET_DIR" ]; then
        mv {{repo}} $TARGET_DIR
        ln -sfn $TARGET_DIR {{repo}} 2>/dev/null || true
      fi
      REPO_DIR="$TARGET_DIR"

      A3 — Build:
      cd $REPO_DIR && npm install --production=false 2>/dev/null || true
      {{build_cmd}}

      A3.5 — Check for duplicate system-level service (CRITICAL):
      If a system-level service exists for this project, it MUST be disabled first:
        sudo systemctl is-active ${PROJECT_NAME}.service 2>/dev/null && sudo systemctl disable --now ${PROJECT_NAME}.service
        sudo rm -f /etc/systemd/system/${PROJECT_NAME}.service 2>/dev/null
        sudo systemctl daemon-reload 2>/dev/null
      This prevents port conflicts and restart loops from having both system and user services.

      A4 — Create systemd service:
      Detect type from project files:
        - next.config with output:'export' → STATIC: serve dist -l $PORT -s
        - next.config without export → NEXTJS: npx next start -p $PORT
        - server/dist/index.js or dist/index.js → NODEJS: node dist/index.js
        - Fallback → npm start with PORT env

      Write ~/.config/systemd/user/${PROJECT_NAME}.service:
      ```
      [Unit]
      Description=$PROJECT_NAME
      After=network.target

      [Service]
      Type=simple
      WorkingDirectory=$REPO_DIR
      ExecStart=<based on type above>
      Restart=on-failure
      RestartSec=5
      KillMode=mixed
      TimeoutStopSec=5
      Environment=NODE_ENV=production

      [Install]
      WantedBy=default.target
      ```
      systemctl --user daemon-reload && systemctl --user enable --now ${PROJECT_NAME}.service

      A5 — Health check (MANDATORY — 5 attempts with retry):
      PRE-FLIGHT: Before starting the service, verify:
        1. Port is free: ! ss -tlnp | grep -q ":$PORT " || echo "PORT $PORT IN USE — stop conflicting service first"
        2. Service file exists: test -f ~/.config/systemd/user/${PROJECT_NAME}.service
        3. WorkingDirectory exists: test -d $REPO_DIR

      After starting service, run health check with 5 retries:
      for i in 1 2 3 4 5; do
        sleep 5
        if curl -sf http://127.0.0.1:$PORT/ > /dev/null 2>&1; then
          echo "Health check passed (attempt $i)"
          break
        fi
        echo "Health check failed (attempt $i/5)"
        if [ $i -eq 5 ]; then
          echo "DEPLOY FAILED: Service not responding after 5 attempts"
          journalctl --user -u ${PROJECT_NAME}.service -n 30 --no-pager
          systemctl --user status ${PROJECT_NAME}.service
          # Try to diagnose and fix
          systemctl --user restart ${PROJECT_NAME}.service
          sleep 5
          curl -sf http://127.0.0.1:$PORT/ > /dev/null 2>&1 || echo "Still failing after restart"
        fi
      done

      A6 — Register in Mission Control (MANDATORY — verify it worked):
      GITHUB_URL=$(cd $REPO_DIR && git remote get-url origin 2>/dev/null | sed 's/.git$//' || echo "")
      GITHUB_SLUG=$(echo "$GITHUB_URL" | sed 's|https://github.com/||')
      # Detect stack from package.json
      STACK_JSON=$(cd $REPO_DIR && node -e "const p=require('./package.json'); const d={...p.dependencies,...p.devDependencies}; const s=[]; if(d.react)s.push('React'); if(d.next)s.push('Next.js'); if(d.express)s.push('Express'); if(d.vite)s.push('Vite'); if(d.typescript)s.push('TypeScript'); if(d.tailwindcss||d['@tailwindcss/postcss'])s.push('Tailwind CSS'); console.log(JSON.stringify(s))" 2>/dev/null || echo '[]')

      # Step 1: Create project
      curl -sf -X POST http://127.0.0.1:3080/api/projects         -H 'Content-Type: application/json'         -d "{"name":"$PROJECT_NAME","description":"{{task}}","repo":"$REPO_DIR","port":$PORT,"domain":"${PROJECT_NAME}.setrox.com.tr","github":"$GITHUB_SLUG"}"

      # Step 2: Verify registration — FAIL if not found
      MC_CHECK=$(curl -sf http://127.0.0.1:3080/api/projects/$PROJECT_NAME 2>/dev/null | grep -c '"id"' || echo "0")
      if [ "$MC_CHECK" = "0" ]; then
        echo "ERROR: MC registration failed — project not found after POST. Retrying..."
        curl -sf -X POST http://127.0.0.1:3080/api/projects           -H 'Content-Type: application/json'           -d "{"name":"$PROJECT_NAME","description":"{{task}}","repo":"$REPO_DIR","port":$PORT,"domain":"${PROJECT_NAME}.setrox.com.tr","github":"$GITHUB_SLUG"}"
      fi

      A7 — Cloudflare Tunnel + DNS:
      HOSTNAME="${PROJECT_NAME}.setrox.com.tr"
      CF_TUNNEL_ID="92d8df83-3623-4850-ba41-29126106d020"
      GUARDRAIL: HOSTNAME must be simple like "space-shooter.setrox.com.tr" (no path segments like repo/projects/fr).
      If HOSTNAME contains more than one hyphen-separated word before .setrox.com.tr, you are doing it WRONG.
      HOSTNAME must equal "{{repo}}.setrox.com.tr" — nothing else. Do NOT derive it from the full path.

      a) Add tunnel ingress + DNS (MUST use this script, never edit config.yml directly):
      sudo bash $HOME/.openclaw/scripts/tunnel-add.sh "$HOSTNAME" "$PORT"
      This script safely: adds ingress rule, validates YAML, rolls back on error,
      restarts cloudflared, and creates DNS CNAME.
      IMPORTANT: Do NOT manually edit /etc/cloudflared/config.yml or use sed on it.

      c) Cloudflare Access is already configured as wildcard (*.setrox.com.tr).
         New subdomains are automatically protected — no per-project action needed.

      → OUTPUT: DEPLOY_TYPE=new-web, all fields filled.

      ┌─────────────────────────────────────────────────────────┐
      │              CATEGORY B: NEW MOBILE APP                 │
      └─────────────────────────────────────────────────────────┘

      B1 — Move to ~/mobile/ (NOT ~/projects/):
      PROJECT_NAME=$(basename {{repo}})
      TARGET_DIR="$HOME/mobile/$PROJECT_NAME"
      if [ "{{repo}}" != "$TARGET_DIR" ] && [ ! -d "$TARGET_DIR" ]; then
        mkdir -p "$HOME/mobile"
        mv {{repo}} $TARGET_DIR
        ln -sfn $TARGET_DIR {{repo}} 2>/dev/null || true
      fi
      REPO_DIR="$TARGET_DIR"
      IMPORTANT: Mobile apps go to ~/mobile/, NEVER to ~/projects/.

      B2 — Install deps:
      cd $REPO_DIR && npm install 2>/dev/null || true

      B3 — Detect mobile framework and verify:
      IS_EXPO=$(cd $REPO_DIR && node -e "try{const p=require('./package.json');console.log(p.dependencies?.expo?'yes':'no')}catch{console.log('no')}" 2>/dev/null || echo "no")
      IS_RN=$(cd $REPO_DIR && node -e "try{const p=require('./package.json');console.log(p.dependencies?.['react-native']?'yes':'no')}catch{console.log('no')}" 2>/dev/null || echo "no")

      If Expo: run `npx expo doctor` to verify setup
      If React Native: run `npx react-native doctor` to check environment

      B4 — Register in Mission Control (type: "mobile"):
      GITHUB_URL=$(cd $REPO_DIR && git remote get-url origin 2>/dev/null | sed 's/.git$//' || echo "")
      GITHUB_SLUG=$(echo "$GITHUB_URL" | sed 's|https://github.com/||')
      STACK_JSON=$(cd $REPO_DIR && node -e "const p=require('./package.json'); const d={...p.dependencies,...p.devDependencies}; const s=[]; if(d['react-native'])s.push('React Native'); if(d.expo)s.push('Expo'); if(d.react)s.push('React'); if(d.typescript)s.push('TypeScript'); if(d.flutter)s.push('Flutter'); console.log(JSON.stringify(s))" 2>/dev/null || echo '[]')

      # Create project with type "mobile"
      curl -sf -X POST http://127.0.0.1:3080/api/projects \
        -H 'Content-Type: application/json' \
        -d '{"name":"'$PROJECT_NAME'","description":"{{task}}","type":"mobile","emoji":"📱","repo":"'$REPO_DIR'","github":"'$GITHUB_SLUG'"}'

      # PATCH with stack and metadata (NO ports, NO service, NO domain)
      curl -sf -X PATCH http://127.0.0.1:3080/api/projects/$PROJECT_NAME \
        -H 'Content-Type: application/json' \
        -d '{"stack":'$STACK_JSON',"type":"mobile","workflowRunId":"{{run_id}}","completedAt":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}'

      # Verify MC registration
      MC_CHECK=$(curl -sf http://127.0.0.1:3080/api/projects/$PROJECT_NAME 2>/dev/null | grep -c '"id"' || echo "0")
      if [ "$MC_CHECK" = "0" ]; then
        echo "WARNING: MC registration may have failed for mobile project $PROJECT_NAME"
      fi

      B5 — NO systemd service, NO port assignment, NO tunnel/DNS:
      Mobile apps do not run as server processes. Skip A4-A7 entirely.

      B6 — Generate QR code info for Expo Go testing:
      If IS_EXPO=yes:
        echo "=== EXPO GO TESTING ==="
        echo "To test on physical device:"
        echo "  1. cd $REPO_DIR"
        echo "  2. npx expo start"
        echo "  3. Scan QR code with Expo Go app (iOS/Android)"
        echo "  Local dev URL: exp://$(hostname -I | awk '{print $1}'):8081"
        echo "========================"
        EXPO_QR_INFO="Run 'npx expo start' in $REPO_DIR and scan QR with Expo Go"
      else
        EXPO_QR_INFO="n/a (not an Expo project)"
      fi

      → OUTPUT: DEPLOY_TYPE=new-mobile, SERVICE_NAME=none, PORT=none, DOMAIN=none, EXPO_QR=${EXPO_QR_INFO}.

      ┌─────────────────────────────────────────────────────────┐
      │           CATEGORY C: EXISTING PROJECT UPDATE           │
      └─────────────────────────────────────────────────────────┘

      C1 — Pull latest and rebuild:
      cd {{repo}} && git checkout main && git pull
      {{build_cmd}}

      C2 — Restart service (if web):
      SERVICE_NAME=$(basename {{repo}}).service
      systemctl --user restart $SERVICE_NAME 2>/dev/null || true

      C3 — Health check (if web):
      Detect port from MC: curl -s http://127.0.0.1:3080/api/projects/$(basename {{repo}}) | jq '.ports.frontend'
      curl -sf http://127.0.0.1:$PORT/ > /dev/null

      C3.5 — Ensure DNS exists (MANDATORY for web projects):
      HOSTNAME="${PROJECT_NAME}.setrox.com.tr"
      # Check if tunnel ingress exists for this hostname
      if ! grep -q "$HOSTNAME" /etc/cloudflared/config.yml 2>/dev/null; then
        echo "DNS/tunnel missing for $HOSTNAME — creating..."
        sudo bash $HOME/.openclaw/scripts/tunnel-add.sh "$HOSTNAME" "$PORT"
      else
        echo "Tunnel ingress exists for $HOSTNAME, verifying DNS..."
        sudo bash $HOME/.openclaw/scripts/tunnel-add.sh "$HOSTNAME" "$PORT"
      fi

      C4 — Update MC metadata (ALWAYS update, even if project exists):
      PROJECT_NAME=$(basename {{repo}})
      GITHUB_URL=$(cd {{repo}} && git remote get-url origin 2>/dev/null | sed 's/.git$//' || echo "")
      GITHUB_SLUG=$(echo "$GITHUB_URL" | sed 's|https://github.com/||')
      SERVICE_NAME="${PROJECT_NAME}.service"
      STACK_JSON=$(cd {{repo}} && node -e "const p=require('./package.json'); const d={...p.dependencies,...p.devDependencies}; const s=[]; if(d.react)s.push('React'); if(d.next)s.push('Next.js'); if(d.express)s.push('Express'); if(d.vite)s.push('Vite'); if(d.typescript)s.push('TypeScript'); if(d.tailwindcss||d['@tailwindcss/postcss'])s.push('Tailwind CSS'); console.log(JSON.stringify(s))" 2>/dev/null || echo '[]')
      
      # Check if project exists in MC; if not, register it first
      MC_CHECK=$(curl -sf http://127.0.0.1:3080/api/projects/$PROJECT_NAME 2>/dev/null | grep -c '"id"' || echo "0")
      if [ "$MC_CHECK" = "0" ]; then
        echo "Project not in MC — registering..."
        curl -sf -X POST http://127.0.0.1:3080/api/projects \
          -H 'Content-Type: application/json' \
          -d '{"name":"'$PROJECT_NAME'","description":"{{task}}","repo":"{{repo}}","domain":"'$PROJECT_NAME'.setrox.com.tr","github":"'$GITHUB_SLUG'"}'
      fi
      
      # ALWAYS PATCH with current port, service, stack, checklist
      # This ensures MC is complete even if project was pre-registered by setup step
      curl -sf -X PATCH http://127.0.0.1:3080/api/projects/$PROJECT_NAME \
        -H 'Content-Type: application/json' \
        -d '{"ports":{"frontend":'$PORT'},"service":"'$PROJECT_NAME'","serviceStatus":"running","stack":'$STACK_JSON',"checklist":[{"id":"task-received","label":"Gorev iletildi","completed":true},{"id":"github-repo","label":"GitHub repo olusturuldu","completed":true},{"id":"dns-setup","label":"Cloudflare DNS ve subdomain olusturuldu","completed":true},{"id":"added-to-projects","label":"Projeler bolumune eklendi","completed":true},{"id":"ports-assigned","label":"Portlar belirlendi","completed":true},{"id":"setup-run","label":"Setup calistirildi","completed":true},{"id":"dev-started","label":"Gelistirici calismaya basladi","completed":true},{"id":"test-review","label":"Test ve review tamamlandi","completed":true}]}'
      
      # Verify PATCH worked
      MC_PORT=$(curl -sf http://127.0.0.1:3080/api/projects/$PROJECT_NAME 2>/dev/null | python3 -c "import json,sys; p=json.load(sys.stdin); print(p.get('ports',{}).get('frontend',''))" 2>/dev/null || echo "")
      if [ -z "$MC_PORT" ] || [ "$MC_PORT" = "None" ]; then
        echo "WARNING: MC PATCH may have failed — port not set after update"
      else
        echo "MC updated: port=$MC_PORT, service=$PROJECT_NAME"
      fi
      
      → OUTPUT: DEPLOY_TYPE=update, existing service restarted.

      ┌─────────────────────────────────────────────────────────┐
      │           CATEGORY D: LIBRARY / SKILL / TOOL            │
      └─────────────────────────────────────────────────────────┘

      D1 — Ensure correct location:
      If repo is NOT under ~/libs/, move it there:
        TARGET_DIR="$HOME/libs/$PROJECT_NAME"
        mv {{repo}} $TARGET_DIR 2>/dev/null || true

      D2 — Install/build if needed:
      cd $TARGET_DIR
      npm install 2>/dev/null || pip install -e . 2>/dev/null || true
      If build script exists: run it.

      D3 — NO Mission Control registration (libs are not projects).
      D4 — NO systemd service, NO tunnel, NO port.

      → OUTPUT: DEPLOY_TYPE=library, SERVICE_NAME=none, PORT=none, DOMAIN=none, MC_PROJECT_ID=none.

      ┌─────────────────────────────────────────────────────────┐
      │            CATEGORY E: NO DEPLOY NEEDED                 │
      └─────────────────────────────────────────────────────────┘

      Nothing to deploy. Just report done.

      → OUTPUT: DEPLOY_TYPE=skip, all fields "none".

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      DEPLOY_TYPE: <new-web|new-mobile|update|library|skip>
      SERVICE_NAME: <name.service|none>
      SERVICE_STATUS: <active|restarted|none>
      PORT: <number|none>
      DOMAIN: <hostname.setrox.com.tr|none>
      MC_PROJECT_ID: <id|none>
      HEALTH_CHECK: <200|n/a>
      DEPLOY_NOTES: <summary of what was done>

      Or if deployment fails:
      STATUS: retry
      DEPLOY_ERRORS:
      - <what went wrong>
      ============================================================
    expects: "STATUS: done"
    max_retries: 3
    on_fail:
      escalate_to: human

