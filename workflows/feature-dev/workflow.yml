      STEP 0 — Merge any remaining open story PRs (cleanup from verify failures):
      1. cd into {{repo}}
      2. git checkout {{branch}} && git pull origin {{branch}}
      3. Check for unmerged story PRs targeting this branch:
         OPEN_STORY_PRS=$(gh pr list --base {{branch}} --state open --json number,headRefName -q '.[].number' 2>/dev/null || echo "")
