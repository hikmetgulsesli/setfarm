# PR-based workflow — each story creates a PR, verifier reviews + merges.
# v12.0: Design-first pipeline. PRD → screens → stories → setup → code.
id: feature-dev
name: Feature Development Workflow
version: 12.0
description: |
  Design-first pipeline: PLAN → DESIGN → STORIES → SETUP-REPO → SETUP-BUILD → IMPLEMENT →
  VERIFY → SECURITY-GATE → FINAL-TEST → DEPLOY.
  Plan step produces PRD only (no stories). Design step generates screens
  from PRD via Stitch (no screen limit). Stories step decomposes PRD into
  user stories using SCREEN_MAP for screen↔story binding.
  Developer creates PR per story, verifier reviews + merges.
  Failed stories are skipped — other stories continue.

agent_mapping:
  planner: main
  setup-repo: atlas
  setup-build: atlas
  designer: mert
  developer: [koda, flux, cipher, prism, lux, nexus]
  reviewer: [sentinel, iris]
  tester: [sentinel, iris]
  security-gate: [sentinel, iris]
  deployer: atlas
  qa-tester: [sentinel, iris]

cron:
  interval_ms: 30000  # 1 minute

polling:
  model: minimax/MiniMax-M2.7
  timeoutSeconds: 1800

agents:
  - id: planner
    name: Planner
    role: analysis
    description: Decomposes tasks into ordered user stories based on PRD functional modules.
    workspace:
      baseDir: agents/planner
      files:
        AGENTS.md: agents/planner/AGENTS.md
        SOUL.md: agents/planner/SOUL.md
        IDENTITY.md: agents/planner/IDENTITY.md

  - id: setup-repo
    name: Setup Repo
    role: coding
    description: Creates repo, GitHub remote, downloads Stitch designs, pushes branch.
    workspace:
      baseDir: agents/setup
      files:
        AGENTS.md: ../../agents/shared/setup/AGENTS.md
        SOUL.md: ../../agents/shared/setup/SOUL.md
        IDENTITY.md: ../../agents/shared/setup/IDENTITY.md

  - id: setup-build
    name: Setup Build
    role: coding
    description: Installs dependencies, establishes build baseline, configures lint.
    workspace:
      baseDir: agents/setup
      files:
        AGENTS.md: ../../agents/shared/setup/AGENTS.md
        SOUL.md: ../../agents/shared/setup/SOUL.md
        IDENTITY.md: ../../agents/shared/setup/IDENTITY.md

  - id: developer
    name: Developer
    role: coding
    description: Implements features per story, creates PR for each.
    workspace:
      baseDir: agents/developer
      files:
        AGENTS.md: agents/developer/AGENTS.md
        SOUL.md: agents/developer/SOUL.md
        IDENTITY.md: agents/developer/IDENTITY.md

  - id: reviewer
    name: Reviewer
    role: verification
    description: Reads PR review comments, fixes issues, merges PR.
    workspace:
      baseDir: agents/reviewer
      files:
        AGENTS.md: agents/reviewer/AGENTS.md
        SOUL.md: agents/reviewer/SOUL.md
        IDENTITY.md: agents/reviewer/IDENTITY.md

  - id: tester
    name: Tester
    role: testing
    description: Integration testing and final PR to main.
    workspace:
      baseDir: agents/tester
      files:
        AGENTS.md: agents/tester/AGENTS.md
        SOUL.md: agents/tester/SOUL.md
        IDENTITY.md: agents/tester/IDENTITY.md

  - id: security-gate
    name: Security Gate
    role: verification
    description: Scans code for security vulnerabilities before final testing.
    workspace:
      baseDir: agents/security-gate
      files:
        AGENTS.md: agents/security-gate/AGENTS.md
        SOUL.md: agents/security-gate/SOUL.md
        IDENTITY.md: agents/security-gate/IDENTITY.md

  - id: qa-tester
    name: QA Tester
    role: coding
    description: Stitch-driven browser QA testing — verifies every screen, button, form, and API.
    workspace:
      baseDir: agents/qa-tester
      files:
        AGENTS.md: agents/qa-tester/AGENTS.md
        SOUL.md: agents/qa-tester/SOUL.md
        IDENTITY.md: agents/qa-tester/IDENTITY.md

  - id: deployer
    name: Deployer
    role: coding
    description: Deploys completed projects — creates systemd service, registers in Mission Control, sets up Cloudflare tunnel.
    workspace:
      baseDir: agents/deployer
      files:
        AGENTS.md: agents/deployer/AGENTS.md
        SOUL.md: agents/deployer/SOUL.md
        IDENTITY.md: agents/deployer/IDENTITY.md

  - id: designer
    name: Designer
    role: coding
    description: Generates UI designs via Stitch API and saves to project.
    workspace:
      baseDir: agents/designer
      files:
        AGENTS.md: agents/designer/AGENTS.md
        SOUL.md: agents/designer/SOUL.md
        IDENTITY.md: agents/designer/IDENTITY.md

steps:
  - id: plan
    agent: planner
    input: |
      DİL KURALI (ZORUNLU): Tüm UI içeriği (buton etiketleri, başlıklar, placeholder'lar, hata mesajları, menü öğeleri) TÜRKÇE olacak. Sadece teknik terimler (API, CSS, component adları) orijinal kalabilir. Kullanıcı farklı dil belirtmedikçe HER ŞEY TÜRKÇE.

      Analyze the following task and produce a detailed PRD (Product Requirements Document).
      Do NOT create stories yet — the design step will generate screen designs first,
      then the stories step will decompose based on both PRD and screen designs.

      TASK:
      {{task}}

      Instructions:
      1. Explore the codebase (if repo exists) to understand the stack, conventions, and patterns
      2. Read references/brainstorming-protocol.md for architectural decision-making
      3. Write a comprehensive PRD covering:
         - Project overview and goals
         - Target platform (web/mobile/desktop)
         - Functional requirements (all features, pages, modules)
         - Technical requirements (stack, DB, APIs, auth)
         - UI/UX requirements (pages, screens, interactions)
         - Non-functional requirements (performance, security)
         - If the task is a game/oyun: specify game type, physics model, input keys,
           state machine states, and require window.game state exposure
      4. The PRD must be detailed enough for a designer to identify ALL screens
         and for a developer to implement without ambiguity

      === MANDATORY: SCREEN TABLE IN PRD ===
      The PRD MUST end with a "## Ekranlar (Screens)" section containing a numbered table:
      | # | Ekran Adı | Tür | Açıklama |
      |---|-----------|-----|----------|
      | 1 | Ana Dashboard | dashboard | KPI kartları, son aktiviteler |
      | 2 | Müşteri Listesi | list-view | Arama, filtre, pagination |
      ...

      MINIMUM SCREEN COUNT by project type:
      - Landing page / static site: 3-5
      - Game (web/mobile): 5-8
      - Dashboard / analytics: 8-15
      - CRUD application: 10-15
      - CRM / ERP / SaaS: 20-35
      - E-commerce: 25-40

      MANDATORY SCREENS for CRUD entities:
      Each entity (customer, quotation, product, etc.) requires minimum 3 screens:
      1. List view (search, filter, pagination)
      2. Detail view (all info, related data, actions)
      3. Form (create/edit, validation)

      Each report type = 1 separate screen (not a single "reports" page).

      Standard screens that MUST be included:
      - Login page
      - Settings (profile, notifications, appearance, security)
      - 404 / Error page
      - Empty states (when lists are empty)

      If the PRD screen table has FEWER screens than the minimum for the project type,
      add the missing screens before outputting the PRD.
      CRITICAL: Even simple single-page apps MUST have at least 3 screens (e.g. main view, error state, empty state).
      PRD_SCREEN_COUNT below 3 will be REJECTED by the pipeline guardrail.

      5. Determine the repo path and branch name
         CRITICAL REPO PATH RULE: The repo path MUST be $HOME/projects/<slug>
         where <slug> is derived from the task description (Turkish chars removed, lowercase, hyphens).
         Example: "Basit hesap makinesi" → $HOME/projects/basit-hesap-makinesi
         NEVER use a different base directory. NEVER translate the project name to English.
         Use the EXACT words from the task, just slugified.

      PREVIOUS FAILURE (if retrying — READ THIS AND FIX THE ISSUE):
      {{previous_failure}}

      ============================================================
      === TECH STACK SELECTION ===
      Analyze the project requirements and choose the BEST tech stack:
      - Simple SPA, game, utility, dashboard, portfolio → vite-react (lightweight, fast)
      - SSR/SEO needed, blog, e-commerce, multi-page content site → nextjs
      - No UI, API only → node-express
      - CLI tool, no frontend → vanilla-ts
      - Mobile app → react-native
      Choose based on actual project needs. Do NOT default to nextjs for everything.
      If the task explicitly mentions a framework, use that one.

      === DATABASE REQUIREMENT ===
      Analyze the project and decide if it needs a database:
      - Static sites, portfolios, landing pages, games → DB_REQUIRED: none
      - Apps with user data, CRUD, auth → DB_REQUIRED: postgres
      - Simple local storage apps → DB_REQUIRED: none
      If unsure, default to none. The pipeline will provision DB only when DB_REQUIRED is postgres.

      MANDATORY OUTPUT FORMAT — PIPELINE WILL BREAK IF YOU SKIP ANY KEY
      ============================================================
      STATUS: done
      REPO: <exact repo path, e.g. $HOME/projects/myproject>
      BRANCH: <branch name, e.g. feature-name>
      TECH_STACK: <vite-react|nextjs|vanilla-ts|node-express|react-native>
      PRD:
      <full PRD text — include all sections, pages, features, technical details>
      PRD_SCREEN_COUNT: <number of rows in the Ekranlar/Screens table>
      DB_REQUIRED: <none|postgres|sqlite>
      ============================================================
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: design
    agent: designer
    input: |
      !include critical-preamble.md

      Generate professional UI designs for all frontend screens using Stitch.
      You work from the PRD — stories do not exist yet. Identify screens from the PRD.

      LANGUAGE RULE: All screen prompts sent to Stitch MUST use Turkish text content.
      Button labels, menu items, headings, placeholder text, error messages — everything
      the user sees on screen must be in Turkish. Example: "Hesapla" not "Calculate",
      "Ayarlar" not "Settings", "Geri Sayım" not "Countdown".
      Only technical terms (API, CSS, HTML) stay in English.

      TASK: {{task}}
      PRD: {{prd}}

      === DEVICE TYPE ===
      - "mobile/React Native/Expo/iOS/Android" in TASK → MOBILE
      - "tablet/iPad" in TASK → TABLET
      - Otherwise → DESKTOP

      === MOBILE VIEWPORT NOTE ===
      When DEVICE_TYPE is MOBILE:
      - All screen designs MUST target 375x812 viewport (iPhone standard)
      - Use safe area insets (top: 44px, bottom: 34px) for notch devices
      - Touch targets minimum 44x44px
      - Bottom navigation bar height: 56px (Material) or 49px (iOS tab bar)
      - Font sizes: minimum 14px body text for mobile readability
      - Design must account for thumb-reachable zones (bottom 60% of screen)
      When DEVICE_TYPE is TABLET:
      - Target 768x1024 viewport (iPad standard)
      - Consider split-view and multitasking layouts

      === STITCH EKRANLARI PIPELINE TARAFINDAN ÜRETİLDİ ===

      Pipeline PRD'yi Stitch'e gönderdi ve tüm ekranları otomatik üretti.
      stitch/ dizininde HTML tasarım dosyaları mevcut.

      *** STITCH API'YE DOKUNMA. generate-screen, create-project, list-screens ÇAĞIRMA. ***
      *** Ekranlar zaten üretildi. Senin görevin KONTROL ETMEK. ***

      GÖREVİN:
      1. stitch/ dizinindeki HTML dosyalarını listele ve incele
      2. Her ekranı PRD'deki ekran tablosuyla karşılaştır
      3. Eksik veya yanlış ekran var mı kontrol et
      4. Design system tutarlılığını doğrula (renkler, fontlar, tema)
      5. SCREEN_MAP oluştur — her ekran için screenId, name, type, description
      6. STATUS: done output'u ver

            === RETRY ===
      Fail → retry 2x. At least 1 screen required, else STATUS: retry.
      Backend-only project (0 UI) → STATUS: done, SCREENS_GENERATED: 0

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      DEVICE_TYPE: <DESKTOP|MOBILE|TABLET>
      DESIGN_SYSTEM:
        aesthetic: <direction>
        palette: <name>
        heading_font: <font>
        body_font: <font>
        icon_library: <library>
      SCREEN_MAP:
      [
        {
          "screenId": "<unique-screen-id>",
          "name": "Main Dashboard",
          "type": "dashboard",
          "description": "Primary overview screen"
        }
      ]
      IMPORTANT: screenId should be a unique kebab-case identifier for each screen
      (the hex string from the API response), NOT a made-up ID like SCR-001.
      The pipeline will map these to real Stitch screen IDs automatically.

      NOTE: Pipeline auto-creates Stitch project and generates all screens from SCREEN_MAP.
      the pipeline guardrail will REJECT your output and force a retry.
      Even if screens were reused/skipped, you MUST output SCREEN_MAP with real IDs.

      ============================================================
    expects: "STATUS: done"
    max_retries: 3
    on_fail:
      escalate_to: human

  - id: stories
    agent: planner
    input: |
      DİL KURALI (ZORUNLU): Tüm UI içeriği (buton etiketleri, başlıklar, placeholder'lar, hata mesajları, menü öğeleri) TÜRKÇE olacak. Sadece teknik terimler (API, CSS, component adları) orijinal kalabilir. Kullanıcı farklı dil belirtmedikçe HER ŞEY TÜRKÇE.

      Read the PRD and SCREEN_MAP from the design step, then decompose the PRD into
      ordered user stories. Each story must reference screens from SCREEN_MAP.

      LANGUAGE RULE: All user-facing text in stories (titles, descriptions, acceptance criteria)
      must be in English for developer clarity, BUT any UI text referenced in acceptance criteria
      (button labels, headings, placeholders) must specify the Turkish version.
      Example: "Button text must be 'Hesapla' (not 'Calculate')"

      TASK: {{task}}
      PRD: {{prd}}
      REPO: {{repo}}
      BRANCH: {{branch}}
      SCREEN_MAP: {{screen_map}}
      DESIGN_SYSTEM: {{design_system}}

      PREVIOUS FAILURE (if retrying — READ THIS AND FIX THE ISSUE):
      {{previous_failure}}

      SCREEN ELEMENT COVERAGE RULE (MANDATORY):
      - Each story's acceptance criteria MUST explicitly list ALL buttons, inputs,
        and UI elements from the corresponding SCREEN_MAP screen
      - If a Stitch screen has 5 buttons, the story AC must mention all 5
      - Include specific element text: "Share button with label 'PAYLAŞ' works"
      - Include modal/popup elements: "Next word countdown timer displays correctly"
      - Include navigation: "Bottom tab bar with OYUN/İSTATİSTİK/AYARLAR tabs navigates correctly"
      - Missing element in AC = missing feature in implementation

      Instructions:
      1. Read the PRD thoroughly to understand all features, pages, and modules
      2. Read SCREEN_MAP to understand which screens were designed
      3. Read references/brainstorming-protocol.md for architectural decision-making
      4. Break the PRD into FUNCTIONAL MODULE based stories (see rules below)
      5. Map each story to its relevant screen(s) from SCREEN_MAP using screenId
      6. Order by dependency: design tokens first, then schema/DB, backend, frontend, integration
      7. Each story must fit in one developer session (one context window)
      8. Every acceptance criterion must be mechanically verifiable
      9. Always include "Typecheck passes" as the last criterion in every story
      10. Every story MUST include test criteria — "Tests for [feature] pass"

      STORY CREATION RULES:

      1. FUNCTIONAL MODULE BASED DECOMPOSITION:
         - PRD section count != story count
         - Each story = one functional module (model + API + UI + tests)
         - If a PRD section has multiple independent modules → separate stories
         - If multiple small PRD sections describe the same module → single story

      2. STORY SIZE RULE:
         - Each story should be completable in 15-25 minutes
         - Estimated 200-500 lines of code
         - If a module needs 500+ lines → split (backend + frontend)

      3. TARGET STORY COUNT BY PRD SIZE (MANDATORY):
         - Tiny PRD (single page, no CRUD, no auth): 3-4 stories (setup + 1-2 feature + integration)
         - Small PRD (< 100 lines, simple app): 4-6 stories
         - Medium PRD (100-400 lines, moderate complexity): 8-15 stories
         - Large PRD (400+ lines, complex app with auth/CRUD/dashboard): 15-25 stories
         - Very Large PRD (enterprise, multi-role, reporting): 25-40 stories
         DO NOT over-split: if two features share the same component, combine them.
         A "Counter button controls" and "Counter display" can be ONE story.
         IMPORTANT: Every page/module in the PRD MUST have its own story.
         Never use placeholder pages like 'yakinda eklenecek'. If the PRD
         describes a module, it MUST be fully implemented in a story.

      4. STORY CONTENT MUST BE RICH:
         - What the functional module does (full description)
         - DB tables/models (if applicable)
         - API endpoints (if applicable)
         - UI components (if applicable)
         - Test requirements (MANDATORY for every story)
         - screens: which screenId(s) from SCREEN_MAP this story implements

      5. ORDERING (by dependency):
         - 1st: Project setup + design tokens + DB schema
         - 2nd: Auth + user management
         - 3rd: Core backend modules (independent ones can run in parallel)
         - 4th: Frontend modules
         - 5th: Integrations + dashboard

      6. MANDATORY INTEGRATION STORY (LAST STORY):
         - The LAST story MUST be an integration/wiring story
         - Title: "Integration wiring and end-to-end verification"
         - This story depends_on ALL other stories
         - Acceptance criteria MUST include:
           a) All components from src/components/ are imported and rendered in their pages
           b) All routes/pages are navigable (no dead routes)
           c) All interactive elements (buttons, forms, links) trigger real functionality
           d) No placeholder text ("Coming soon", "Game Started!", "TODO", etc.)
           e) State transitions work end-to-end (e.g. menu -> game -> pause -> game over)
           f) Canvas/game/chart renders actual content, not static text
           g) window.game object is exposed with player state, score, and game state
           h) Keyboard input (Space/ArrowUp) causes visible state change within 100ms
           i) No Math.random() in render loop — random values seeded at init
           j) Single state machine
           k) Remove all orphan/dead code files created by individual stories that are
              no longer needed after integration (e.g. standalone components replaced by
              unified modules, duplicate utility files, unused story-specific helpers) — not dual string+object tracking
         - This story WIRES everything together - without it, components exist in isolation

      7. INTEGRATION STORY MUST CLEAN DEAD CODE:
         - The integration story acceptance criteria MUST include:
           "Remove all orphan/dead code files from previous stories that were
           superseded by integration wiring. If story X created helper.ts but
           integration replaces it with a unified module, delete helper.ts."
         - This prevents file bloat from incremental story development.

      SHARED FILE CONFLICT PREVENTION (CRITICAL):
      Stories run in parallel worktrees. If 2 stories modify the same file,
      merge conflicts WILL occur and waste retries. Rules:
      - package.json: ONLY the FIRST story (US-001 setup) should add dependencies.
        All other stories MUST NOT run npm install or modify package.json.
        If a story needs a new dependency, add it to US-001's acceptance criteria.
      - Shared type files (types/*.ts): Define ALL types in US-001. Later stories
        MUST import existing types, never create overlapping type definitions.
      - Config files (tsconfig.json, tailwind.config.*, vite.config.*): ONLY US-001.
      - If 2 stories MUST touch the same file, use depends_on so they run sequentially.

      DO NOT:
      - Create micro-stories ("Create user model" separate, "Create user API" separate → WRONG)
      - Make stories for non-code sections (metrics, risks, timeline)
      - Create stories that take longer than 30 minutes
      - Have multiple stories modify package.json, tsconfig.json, or shared type files

      ============================================================
      MANDATORY OUTPUT FORMAT — PIPELINE WILL BREAK IF YOU SKIP ANY KEY
      ============================================================
      STATUS: done
      STORIES_JSON:
      [
        {
          "id": "US-001",
          "title": "Short title",
          "description": "What this story implements — full functional module description",
          "acceptanceCriteria": ["Criterion 1", "Tests pass", "Typecheck passes"],
          "depends_on": [],
          "screens": ["SCR-001"]
        }
      ]

      DEPENDENCY RULES (depends_on field):
      - Foundation stories (setup, design tokens, DB schema): depends_on: [] (no dependencies)
      - Page/feature stories: depends_on: ["US-001"] (depend on foundation)
      - Integration stories (navigation, routing, final tests): depends_on: ["US-002", "US-003"]
      - Stories with depends_on will NOT start until ALL listed stories are complete
      - ALWAYS add depends_on for stories that reference other stories' output

      SCREEN_MAP:
      <output the SCREEN_MAP again, but now with "stories" field added to each screen>
      [
        {
          "screenId": "SCR-001",
          "name": "Main Dashboard",
          "type": "dashboard",
          "description": "Primary overview screen",
          "stories": ["US-001", "US-003"]
        }
      ]
      ============================================================
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: setup-repo
    agent: setup-repo
    input: |
      !include critical-preamble.md

      Set up the repository and download design assets.
      Run this single command to do everything:

      bash $HOME/.openclaw/setfarm-repo/scripts/setup-repo.sh {{repo}} {{branch}} {{stitch_project_id}} '{{screen_map}}'

      The script handles: git init, GitHub remote, .gitignore, branch, stitch download, push.

      After setup-repo.sh completes successfully, also extract DESIGN.md:
        STITCH_SCRIPT="$HOME/.openclaw/setfarm-repo/scripts/stitch-api.mjs"
        if [ -n "{{stitch_project_id}}" ] && [ "{{stitch_project_id}}" != "undefined" ]; then
          cd "{{repo}}"
          node "$STITCH_SCRIPT" get-design-md "{{stitch_project_id}}" "{{repo}}"
          if [ -f "{{repo}}/DESIGN.md" ]; then
            git add DESIGN.md && git commit -m "design: add DESIGN.md from Stitch" || true
            git push origin {{branch}} || true
          fi
        fi

      Report the script output as your output. If it prints STATUS: fail, report STATUS: fail.

      ============================================================
      MANDATORY OUTPUT FORMAT
      ============================================================
      STATUS: done
      EXISTING_CODE: <true/false>
      ============================================================
    expects: "STATUS: done"
    max_retries: 4
    on_fail:
      escalate_to: human

  - id: setup-build
    agent: setup-build
    input: |
      !include critical-preamble.md

      Install dependencies, establish build baseline, and configure lint.

      TASK: {{task}}
      REPO: {{repo}}
      BRANCH: {{branch}}

      Instructions:
      1. cd {{repo}} && git checkout {{branch}}

      PROJECT SCAFFOLDING (if no package.json exists):
      If there is NO package.json in the repo root, you MUST scaffold the project.
      Use TECH_STACK from plan context: {{tech_stack}}
      CRITICAL: Always scaffold IN the current directory (use . not project name).
      CRITICAL: You are ALREADY inside the repo directory. Do NOT create a subdirectory.

      STITCH ASSET PROTECTION (CRITICAL — do this BEFORE scaffolding):
      Scaffold tools (create-next-app, create-vite, etc.) DELETE all existing files in the directory.
      You MUST backup stitch/ and other design assets BEFORE running any scaffold command:
        mkdir -p /tmp/_stitch_backup_$(basename {{repo}})
        cp -r stitch/ /tmp/_stitch_backup_$(basename {{repo}})/ 2>/dev/null || true
        cp .stitch /tmp/_stitch_backup_$(basename {{repo}})/ 2>/dev/null || true
        cp DESIGN.md /tmp/_stitch_backup_$(basename {{repo}})/ 2>/dev/null || true
        cp -r references/ /tmp/_stitch_backup_$(basename {{repo}})/ 2>/dev/null || true
      After scaffolding completes, RESTORE them:
        cp -r /tmp/_stitch_backup_$(basename {{repo}})/stitch/ . 2>/dev/null || true
        cp /tmp/_stitch_backup_$(basename {{repo}})/.stitch . 2>/dev/null || true
        cp /tmp/_stitch_backup_$(basename {{repo}})/DESIGN.md . 2>/dev/null || true
        cp -r /tmp/_stitch_backup_$(basename {{repo}})/references/ . 2>/dev/null || true
        rm -rf /tmp/_stitch_backup_$(basename {{repo}})
      VERIFY: ls stitch/*.html — stitch files must exist after scaffolding.

      Commands by TECH_STACK:
      - nextjs:        npx create-next-app@latest . --typescript --tailwind --eslint --app --no-src-dir --import-alias "@/*" --yes
      - vite-react:    npm create vite@latest . -- --template react-ts && npm install
      - vanilla-ts:    npm init -y && npm install -D typescript
      - node-express:  npm init -y && npm install express && npm install -D typescript @types/express @types/node
      - react-native:  npx react-native init . --template react-native-template-typescript
      - expo:          npx create-expo-app . -t expo-template-blank-typescript && npx expo install expo-router expo-status-bar

      MOBILE SCAFFOLDING (TECH_STACK = react-native OR expo):
      If TECH_STACK is "react-native" or "expo", apply these additional steps:
      1. Detect which framework: check if task/PRD mentions "Expo" → use expo scaffold
         Otherwise → use react-native scaffold
      2. For Expo projects, also install common mobile deps:
         npx expo install react-native-safe-area-context react-native-screens
      3. Create app.json / app.config.ts if not present (Expo needs this)
      4. Skip FRONTEND BUNDLER SETUP — React Native/Expo have their own bundler (Metro)
      5. Build verification: npx expo doctor 2>/dev/null || npx react-native doctor 2>/dev/null || true
      6. The project dir should be ~/mobile/<name>/ not ~/projects/<name>/
         (deploy step handles the move, but setup-build should NOT assume ~/projects/ path)

      After scaffolding, IMMEDIATELY create .gitignore (scaffold tools often skip this):
      cat > .gitignore << 'GITIGNORE'
      node_modules/
      dist/
      build/
      .next/
