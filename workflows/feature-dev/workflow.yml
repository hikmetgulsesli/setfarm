         - Any other error: read the file and line number, fix the issue
      4. git add -A && git commit -m "fix: address quality gate issues"
      5. git push origin {{branch}}
      6. Then continue with STEP 1


      STEP 1 — Checkout and review combined PR:
      1. cd into {{repo}}
      2. Clean files that block checkout/rebase:
