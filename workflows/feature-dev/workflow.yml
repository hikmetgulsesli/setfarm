         git checkout -- .setfarm-step-output.txt 2>/dev/null || true
      3. git fetch origin
      4. git checkout {{branch}} && git pull origin {{branch}}
         If checkout fails with "local changes would be overwritten":
           git stash && git checkout {{branch}} && git pull origin {{branch}} && git stash pop 2>/dev/null || true
      5. Read the combined PR diff to understand all changes:
         if [ -n "{{final_pr}}" ]; then
           gh pr view "{{final_pr}}" --json additions,deletions,changedFiles 2>/dev/null || true
           gh pr diff "{{final_pr}}" 2>/dev/null | head -500
         fi
      6. Proceed to STEP 2

      STEP 2 — Quality review of combined feature:
      1. Run lint: {{lint_cmd}} → fix any lint errors
      2. Run build: {{build_cmd}} → fix any build errors
      3. Run test: {{test_cmd}} → fix any test failures
      4. If fixes were needed:
