      To check mergeable status: gh pr view URL --json mergeable --jq '.mergeable'

      === COMBINED VERIFY + FIX + MERGE WORKFLOW ===

      STEP 0 — Fix previous failures (MANDATORY if PREVIOUS FAILURE is non-empty):
      If previous_failure contains QUALITY GATE or GUARDRAIL errors:
      1. cd {{repo}}
      2. git checkout {{branch}} && git pull origin {{branch}}
      2b. If checkout fails with "local changes would be overwritten":
