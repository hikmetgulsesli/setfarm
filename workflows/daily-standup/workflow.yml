id: daily-standup
name: Daily Standup Meeting
version: 2
description: |
  Daily standup report. Collector gathers agent activity, run status, and
  system health for the last 24 hours. Reporter prepares a concise summary and
  sends it to Discord and Telegram.

agent_mapping:
  collector: nexus
  reporter: lux

cron:
  interval_ms: 240000

polling:
  model: minimax-openai/MiniMax-M3
  timeoutSeconds: 600

notifications:
  url: http://127.0.0.1:3080/api/discord-notify

agents:
  - id: collector
    name: Collector
    role: analysis
    model: minimax-openai/MiniMax-M3
    description: Collects agent activity, run status, and system health from the last 24 hours.
    workspace:
      baseDir: agents/collector
      files:
        AGENTS.md: agents/collector/AGENTS.md
        IDENTITY.md: agents/collector/IDENTITY.md

  - id: reporter
    name: Reporter
    role: analysis
    model: minimax-openai/MiniMax-M3
    description: Summarizes collected data and sends it to Discord and Telegram.
    workspace:
      baseDir: agents/reporter
      files:
        AGENTS.md: agents/reporter/AGENTS.md
        IDENTITY.md: agents/reporter/IDENTITY.md

steps:
  - id: collect
    agent: collector
    input: |
      Collect data for the daily standup. Run the commands below and report the outputs.

      1. RUNS FROM THE LAST 24 HOURS:
      sqlite3 ~/.openclaw/setfarm/setfarm.db "SELECT workflow_id, status, task, created_at FROM runs WHERE datetime(created_at) > datetime('now', '-24 hours') ORDER BY created_at DESC;"

      2. STORY STATUS FROM THE LAST 24 HOURS:
      sqlite3 ~/.openclaw/setfarm/setfarm.db "SELECT s.story_id, s.title, s.status, s.retry_count, r.workflow_id FROM stories s JOIN runs r ON r.id = s.run_id WHERE datetime(s.updated_at) > datetime('now', '-24 hours') ORDER BY s.updated_at DESC LIMIT 30;"

      3. AGENT ACTIVITY:
      curl -s http://127.0.0.1:3080/api/setfarm/agents 2>/dev/null || echo "MC API unavailable"

      4. ACTIVE ALERTS:
      curl -s http://127.0.0.1:3080/api/setfarm/alerts 2>/dev/null || echo "No alerts endpoint"

      5. SYSTEM STATUS:
      echo "=== UPTIME ===" && uptime
      echo "=== MEMORY ===" && free -h
      echo "=== DISK ===" && df -h / /home
      echo "=== DOCKER ===" && docker ps --format "table {{.Names}}\t{{.Status}}" 2>/dev/null

      6. COST:
      curl -s http://127.0.0.1:3080/api/costs 2>/dev/null | head -50 || echo "No cost data"

      MANDATORY OUTPUT FORMAT:
      STATUS: done
      RUNS_DATA: <run summary from last 24 hours>
      STORIES_DATA: <story status summary>
      AGENTS_DATA: <agent activity summary>
      SYSTEM_DATA: <system health summary>
      COST_DATA: <cost summary>
      ALERTS_DATA: <alert summary>
    expects: "STATUS: done"
    max_retries: 1
    on_fail:
      escalate_to: human

  - id: report
    agent: reporter
    input: |
      Summarize and send the standup report.

      COLLECTED DATA:
      RUNS: {{runs_data}}
      STORIES: {{stories_data}}
      AGENTS: {{agents_data}}
      SYSTEM: {{system_data}}
      COST: {{cost_data}}
      ALERTS: {{alerts_data}}

      TASKS - RUN ALL OF THEM IN ORDER. DO NOT SKIP ANY TASK.

      TASK 1: Write the report to a file. Keep dollar signs literal; do not shell-escape them:
      ```
      cat > /tmp/standup-report.txt << 'STANDUP_EOF'
      <write the report in the format below>
      STANDUP_EOF
      ```

      TASK 2: Send to Discord from the file:
      ```
      openclaw message send --channel discord --target 1472655519662477315 --message "$(cat /tmp/standup-report.txt)"
      ```

      TASK 3: Send to Telegram from the file:
      ```
      openclaw message send --channel telegram --target 725838988 --message "$(cat /tmp/standup-report.txt)"
      ```

      TASK 4: Save a persistent record:
      ```
      cp /tmp/standup-report.txt ~/.openclaw/workspace/memory/meetings/standup-$(date +%Y-%m-%d).md
      ```

      CRITICAL: Actually run every command. Do not say "sent" without running the command and showing its output.
      Do not report STATUS: done until command output includes "Sent via Discord" and "Sent via Telegram".

      REPORT FORMAT:
      DAILY STANDUP - <date>

      RUNS (last 24h)
      - <workflow>: <status> - <summary>

      AGENT ACTIVITY
      - <agent>: <what it did>

      SYSTEM
      - RAM: .../... | Disk: .../... | Uptime: ...

      COST
      - Daily total: USD ...

      ALERTS
      - <list alerts if present; otherwise write "Clear">

      NOTE: Write cost values in "USD 0.26" format. Do not use a dollar sign.

      MANDATORY OUTPUT FORMAT:
      STATUS: done
      SUMMARY: <summary of the sent report, including Discord and Telegram message IDs>
    expects: "STATUS: done"
    max_retries: 1
    on_fail:
      escalate_to: human
